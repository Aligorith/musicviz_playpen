name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Build project
      run: |
        # Create a "gh-pages" folder to serve, and copy all the runnable apps there
        mkdir ./gh-pages
        cp ./03_spectro_tool/src/spectrochrome.html ./gh-pages/.

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./gh_pages  # Change this to your output directory

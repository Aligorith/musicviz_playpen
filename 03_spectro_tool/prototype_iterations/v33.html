<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Interactive CQT Spectrogram</title>

<style>
html, body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#454545;
    font-family:sans-serif;
    color:white;
    cursor:default;
}

#canvas{
    position:absolute;
    inset:0;
    width:100vw;
    height:100vh;
}

#topbar{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    z-index:20;

    background:rgba(30,30,30,0.72);
    backdrop-filter:blur(8px);

    padding:10px;
    box-sizing:border-box;
}

.row{
    display:flex;
    align-items:center;
    width:100%;
    gap:10px;
}

.leftControls{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    flex:1;
}

.centerControls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex:1;
}

.rightControls{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:16px;
    flex:1;
}

#status{
    margin-top:6px;
    font-size:13px;
    color:#ddd;
}

button{
    cursor:pointer;
}

label{
    font-size:12px;
}

input[type="range"]{
    width:140px;
}

#legendPanel{
    position:absolute;
    right:20px;
    top:90px;
    width:260px;
    background:rgba(25,25,25,0.95);
    border-radius:12px;
    padding:14px;
    z-index:50;
    display:none;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.legendRow{
    display:flex;
    align-items:center;
    margin-bottom:8px;
    font-size:13px;
}

.swatch{
    width:20px;
    height:20px;
    border-radius:5px;
    margin-right:10px;
}

.sectionTitle{
    margin-top:10px;
    margin-bottom:8px;
    font-size:13px;
    opacity:0.8;
}
</style>
</head>

<body>

<div id="topbar">

    <div class="row">

        <div class="leftControls">

            <input type="file" id="file"/>

            <label>
                A=
                <select id="aTuning">
                    <option value="440">440 Hz</option>
                    <option value="432">432 Hz</option>
                    <option value="custom">Custom</option>
                </select>
            </label>

            <button id="analyze">
                Analyze
            </button>

            <button id="export">
                Export
            </button>

        </div>

        <div class="centerControls">

            <button id="playPauseBtn">
                ▶ Play
            </button>

            <button id="stopBtn">
                ⏹ Stop
            </button>

            <button id="restartBtn">
                ↺ Restart
            </button>

        </div>

        <div class="rightControls">

            <button id="legendBtn">
                Legend
            </button>

            <label>
                Tuning Offset

                <input
                    type="range"
                    id="tuning"
                    min="-12"
                    max="12"
                    step="0.01"
                    value="0"
                />

                <span id="tuningVal">
                    0.00 st
                </span>
            </label>

            <label>
                Brightness

                <input
                    type="range"
                    id="brightness"
                    min="0.2"
                    max="4"
                    step="0.05"
                    value="1"
                />
            </label>

        </div>

    </div>

    <div id="status">
        Load file
    </div>

</div>

<div id="legendPanel">

    <div class="sectionTitle">
        Pitch Colour Mapping
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#f8d0a0;"></div>
        C = gold / peach
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#203c96;"></div>
        D = navy blue
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#d8b0ff;"></div>
        E above tuning A = lavender
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#785032;"></div>
        E below tuning A = brown
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#beff50;"></div>
        F = yellow-green
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#46be32;"></div>
        G = lawn green
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#ff4646;"></div>
        A = red
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#78dcff;"></div>
        B = sky blue
    </div>

</div>

<canvas id="canvas"></canvas>

<script>

/* ------------------------------------------------ */

const MIN_FREQ = 49;
const MAX_FREQ = 8000;

let aTuningHz = 440;

let cachedSpectrogram = [];
let cachedFFTSize = 4096;
let cachedSampleRate = 44100;

let revealColumns = 0;

/* ------------------------------------------------ */

const canvas =
    document.getElementById("canvas");

const ctx =
    canvas.getContext("2d");

const specCanvas =
    document.createElement("canvas");

const specCtx =
    specCanvas.getContext("2d");

/* ------------------------------------------------ */

function resize(){

    canvas.width = innerWidth;
    canvas.height = innerHeight;

    specCanvas.width = innerWidth;
    specCanvas.height = innerHeight;

    redrawSpectrogram();
}

addEventListener("resize", resize);

resize();

/* ------------------------------------------------ */

const audioCtx =
    new (
        window.AudioContext ||
        window.webkitAudioContext
    )();

let audioBuffer = null;

let playbackSource = null;

let playbackStartTime = 0;
let playbackOffset = 0;
let playbackRunning = false;

/* ------------------------------------------------ */

const statusEl =
    document.getElementById("status");

let audioDuration = 0;

let brightnessBoost = 1;

let tuningOffset = 0;

let tuningDragValue = 0;
let tuningDragging = false;

let mouseX = -9999;

const midiEvents = [];

let prevEnergy = 0;

/* ------------------------------------------------ */

function formatTime(s){

    return (
        String(Math.floor(s / 60))
        .padStart(2,"0")
        + ":" +
        String(Math.floor(s % 60))
        .padStart(2,"0")
    );
}

/* ------------------------------------------------ */

function tunedMidi(freq){

    return (
        69 +
        12 *
        Math.log2(freq / aTuningHz)
    ) +
    (
        tuningDragging
        ? tuningDragValue
        : tuningOffset
    );
}

/* ------------------------------------------------ */

function midiToLabel(m){

    const n =
        (
            Math.round(m) % 12 + 12
        ) % 12;

    return [
        "c","c#","d","d#",
        "e","f","f#","g",
        "g#","a","a#","b"
    ][n];
}

/* ------------------------------------------------ */

function freqToY(freq){

    return (
        canvas.height -
        40 -
        (
            Math.log2(
                freq / MIN_FREQ
            ) /
            Math.log2(
                MAX_FREQ / MIN_FREQ
            )
        ) *
        (
            canvas.height - 180
        )
    );
}

/* ------------------------------------------------ */

function dominantPitchAtTime(t){

    let best = null;

    for(const e of midiEvents){

        if(
            t >= e.start &&
            t <= e.end
        ){

            if(
                !best ||
                e.freq > best.freq
            ){
                best = e;
            }
        }
    }

    return best;
}

/* ------------------------------------------------ */

function colorForFreq(freq){

    const midi =
        tunedMidi(freq);

    const octave =
        Math.floor(midi / 12);

    const pitch =
        Math.round(midi) % 12;

    switch(pitch){

        case 0:
            return [255,210,160];

        case 2:
            return [40,60,150];

        case 4:
            return (
                freq >= aTuningHz
                ? [220,180,255]
                : [120,80,50]
            );

        case 5:
            return [190,255,80];

        case 7:

            if(octave < 4)
                return [0,80,30];

            if(octave === 4)
                return [70,190,50];

            return [180,255,80];

        case 9:
            return [255,70,70];

        case 11:
            return [120,220,255];

        default:
            return [180,180,180];
    }
}

/* ------------------------------------------------ */

function pitchColorCSS(freq){

    const c =
        colorForFreq(freq);

    return `rgb(${c[0]},${c[1]},${c[2]})`;
}

/* ------------------------------------------------ */

document
.getElementById("brightness")
.addEventListener(
    "input",
    e => {

        brightnessBoost =
            parseFloat(
                e.target.value
            );

        redrawSpectrogram();
    }
);

/* ------------------------------------------------ */

function redrawSpectrogram(){

    specCtx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(!cachedSpectrogram.length)
        return;

    const xScale =
        canvas.width /
        cachedSpectrogram.length;

    for(
        let i=0;
        i<revealColumns;
        i++
    ){

        const spec =
            cachedSpectrogram[i];

        if(!spec) continue;

        for(
            let b=1;
            b<spec.length;
            b++
        ){

            const freq =
                b *
                (
                    cachedSampleRate /
                    cachedFFTSize
                );

            if(
                freq < MIN_FREQ ||
                freq > MAX_FREQ
            ) continue;

            const y =
                freqToY(freq);

            const mag =
                spec[b];

            const alpha =
                Math.min(
                    1,
                    (
                        Math.log10(
                            1 + mag
                        ) / 2.1
                    ) *
                    brightnessBoost
                );

            const c =
                colorForFreq(freq);

            specCtx.fillStyle =
                `rgba(
                    ${c[0]},
                    ${c[1]},
                    ${c[2]},
                    ${alpha}
                )`;

            specCtx.fillRect(
                i * xScale,
                y,
                Math.ceil(xScale)+1,
                1
            );
        }
    }
}

/* ------------------------------------------------ */

function fft(sig){

    const N = sig.length;

    const out =
        new Float32Array(N/2);

    for(let k=0;k<N/2;k++){

        let re=0;
        let im=0;

        for(let n=0;n<N;n++){

            const p =
                2*Math.PI*k*n/N;

            re +=
                sig[n] *
                Math.cos(p);

            im -=
                sig[n] *
                Math.sin(p);
        }

        out[k] =
            Math.sqrt(
                re*re +
                im*im
            );
    }

    return out;
}

/* ------------------------------------------------ */

function energy(frame){

    let e = 0;

    for(const x of frame)
        e += x*x;

    return e;
}

/* ------------------------------------------------ */

function onset(curr,prev){

    return (
        curr /
        (prev + 1e-6)
    ) > 1.6;
}

/* ------------------------------------------------ */

async function process(buffer){

    audioBuffer = buffer;

    audioDuration =
        buffer.duration;

    cachedSpectrogram = [];

    revealColumns = 0;

    midiEvents.length = 0;

    cachedSampleRate =
        buffer.sampleRate;

    const data =
        buffer.getChannelData(0);

    const fftSize = 4096;

    const hop = 1024;

    cachedFFTSize = fftSize;

    const total =
        Math.floor(
            (
                data.length -
                fftSize
            ) / hop
        );

    prevEnergy = 0;

    for(let i=0;i<total;i++){

        const seg =
            data.slice(
                i*hop,
                i*hop+fftSize
            );

        for(let j=0;j<seg.length;j++){

            seg[j] *=
                0.5 *
                (
                    1 -
                    Math.cos(
                        2*Math.PI*j /
                        (
                            seg.length-1
                        )
                    )
                );
        }

        const currE =
            energy(seg);

        const isOn =
            onset(currE,prevEnergy);

        const spec =
            fft(seg);

        cachedSpectrogram.push(spec);

        revealColumns =
            cachedSpectrogram.length;

        if(isOn){

            let strongest = 0;
            let strongestBin = 0;

            for(let b=1;b<spec.length;b++){

                if(spec[b] > strongest){

                    strongest = spec[b];
                    strongestBin = b;
                }
            }

            const freq =
                strongestBin *
                (
                    buffer.sampleRate /
                    fftSize
                );

            const t =
                i * hop /
                buffer.sampleRate;

            midiEvents.push({
                start:t,
                end:t+0.3,
                freq,
                label:
                    midiToLabel(
                        tunedMidi(freq)
                    )
            });
        }

        prevEnergy = currE;

        statusEl.textContent =
            `Processing ${
                i
            } / ${
                total
            }`;

        redrawSpectrogram();

        await new Promise(
            r=>setTimeout(r,0)
        );
    }

    statusEl.textContent =
        "Ready";
}

/* ------------------------------------------------ */

function drawTimeline(){

    if(!audioDuration)
        return;

    const y =
        canvas.height - 28;

    const px =
        canvas.width /
        audioDuration;

    for(let s=0;s<=audioDuration;s++){

        const x = s*px;

        const major =
            s % 10 === 0;

        ctx.strokeStyle =
            "white";

        ctx.lineWidth =
            major ? 2 : 1;

        ctx.beginPath();

        ctx.moveTo(x,y);

        ctx.lineTo(
            x,
            y - (
                major
                ? 25
                : 12
            )
        );

        ctx.stroke();

        if(major){

            ctx.fillStyle =
                "white";

            ctx.font =
                "11px monospace";

            ctx.fillText(
                formatTime(s),
                x+3,
                y-30
            );
        }
    }
}

/* ------------------------------------------------ */

function drawCMarkers(){

    for(let o=0;o<9;o++){

        const midi =
            12 + o*12;

        const freq =
            aTuningHz *
            Math.pow(
                2,
                (midi - 69)/12
            );

        if(
            freq < MIN_FREQ ||
            freq > MAX_FREQ
        ) continue;

        const y =
            freqToY(freq);

        ctx.strokeStyle =
            "rgba(255,255,255,0.28)";

        ctx.beginPath();

        ctx.moveTo(0,y);
        ctx.lineTo(16,y);

        ctx.stroke();

        if(o === 4){

            ctx.fillStyle =
                "rgba(255,255,255,0.12)";

            ctx.beginPath();

            ctx.roundRect(
                18,
                y - 10,
                30,
                16,
                6
            );

            ctx.fill();

            ctx.strokeStyle =
                "rgba(255,255,255,0.6)";

            ctx.stroke();

            ctx.fillStyle =
                "white";

            ctx.font =
                "bold 12px monospace";

        }else{

            ctx.fillStyle =
                "rgba(255,255,255,0.75)";

            ctx.font =
                "11px monospace";
        }

        ctx.fillText(
            `c${o}`,
            24,
            y + 3
        );
    }
}

/* ------------------------------------------------ */

function drawBubbles(){

    for(const e of midiEvents){

        const x =
            (
                e.start /
                audioDuration
            ) *
            canvas.width;

        const active =
            Math.abs(x-mouseX) < 40;

        const w =
            active ? 180 : 10;

        const h = 18;

        ctx.fillStyle =
            active
            ? "rgba(255,140,40,0.92)"
            : "rgba(80,120,255,0.55)";

        ctx.beginPath();

        ctx.roundRect(
            x,
            canvas.height*0.84,
            w,
            h,
            8
        );

        ctx.fill();

        if(active){

            ctx.fillStyle =
                "white";

            ctx.font =
                "bold 12px monospace";

            ctx.fillText(
                e.label,
                x + 8,
                canvas.height*0.84 + 13
            );
        }
    }
}

/* ------------------------------------------------ */

function stopPlayback(){

    if(playbackSource){

        try{
            playbackSource.stop();
        }catch(e){}

        playbackSource.disconnect();

        playbackSource = null;
    }

    playbackRunning = false;

    document
    .getElementById("playPauseBtn")
    .textContent =
        "▶ Play";
}

/* ------------------------------------------------ */

function playAt(offset){

    if(!audioBuffer)
        return;

    stopPlayback();

    playbackSource =
        audioCtx.createBufferSource();

    playbackSource.buffer =
        audioBuffer;

    playbackSource.connect(
        audioCtx.destination
    );

    playbackOffset =
        offset;

    playbackStartTime =
        audioCtx.currentTime;

    playbackSource.start(
        0,
        offset
    );

    playbackRunning = true;

    document
    .getElementById("playPauseBtn")
    .textContent =
        "⏸ Pause";
}

/* ------------------------------------------------ */

function render(){

    requestAnimationFrame(render);

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.drawImage(
        specCanvas,
        0,
        0
    );

    drawTimeline();

    drawCMarkers();

    drawBubbles();

    if(playbackRunning){

        const current =
            playbackOffset +
            (
                audioCtx.currentTime -
                playbackStartTime
            );

        mouseX =
            (
                current /
                audioDuration
            ) *
            canvas.width;

        if(current >= audioDuration){

            stopPlayback();
        }
    }

    if(mouseX > 0){

        ctx.strokeStyle =
            "rgba(255,140,40,0.85)";

        ctx.lineWidth = 2;

        ctx.beginPath();

        ctx.moveTo(mouseX,0);
        ctx.lineTo(mouseX,canvas.height);

        ctx.stroke();

        const t =
            (
                mouseX /
                canvas.width
            ) *
            audioDuration;

        const pitch =
            dominantPitchAtTime(t);

        const noteLabel =
            pitch
            ? pitch.label
            : "--";

        const label =
            `${formatTime(t)}  ${noteLabel}`;

        ctx.font =
            "12px monospace";

        const tw =
            ctx.measureText(label)
            .width;

        const bx =
            Math.min(
                canvas.width - tw - 58,
                mouseX + 10
            );

        const bubbleY =
            document
            .getElementById("topbar")
            .offsetHeight + 8;

        ctx.fillStyle =
            "rgba(255,140,40,0.95)";

        ctx.beginPath();

        ctx.roundRect(
            bx,
            bubbleY,
            tw + 44,
            24,
            8
        );

        ctx.fill();

        if(pitch){

            ctx.fillStyle =
                pitchColorCSS(
                    pitch.freq
                );

            ctx.beginPath();

            ctx.roundRect(
                bx + 8,
                bubbleY + 5,
                14,
                14,
                4
            );

            ctx.fill();
        }

        ctx.fillStyle =
            "white";

        ctx.fillText(
            label,
            bx + 30,
            bubbleY + 16
        );
    }
}

/* ------------------------------------------------ */

async function decode(f){

    return audioCtx.decodeAudioData(
        await f.arrayBuffer()
    );
}

/* ------------------------------------------------ */

canvas.addEventListener(
    "mousemove",
    e => {

        mouseX =
            e.clientX;
    }
);

/* ------------------------------------------------ */

canvas.addEventListener(
    "click",
    e => {

        const t =
            (
                e.clientX /
                canvas.width
            ) *
            audioDuration;

        if(playbackRunning){

            playAt(t);

        }else{

            mouseX =
                e.clientX;
        }
    }
);

/* ------------------------------------------------ */

document
.getElementById("analyze")
.onclick = async ()=>{

    const f =
        document
        .getElementById("file")
        .files[0];

    if(!f)
        return;

    const buf =
        await decode(f);

    await process(buf);
};

/* ------------------------------------------------ */

document
.getElementById("playPauseBtn")
.onclick = ()=>{

    if(playbackRunning){

        stopPlayback();

    }else{

        playAt(
            (
                mouseX > 0
                ? mouseX / canvas.width
                : 0
            ) * audioDuration
        );
    }
};

/* ------------------------------------------------ */

document
.getElementById("stopBtn")
.onclick = ()=>{

    stopPlayback();

    mouseX = -9999;
};

/* ------------------------------------------------ */

document
.getElementById("restartBtn")
.onclick = ()=>{

    playAt(0);
};

/* ------------------------------------------------ */

render();

</script>
</body>
</html>

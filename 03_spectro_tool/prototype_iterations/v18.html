<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CQT Spectrogram + Onsets + UI</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0f0f10;
    font-family: sans-serif;
    color: white;
}

#canvas {
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;
}

#topbar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 20;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    padding: 10px;
    box-sizing: border-box;
}

#status {
    margin-top: 6px;
    font-size: 13px;
    color: #ccc;
}

button {
    cursor: pointer;
}

</style>
</head>

<body>

<div id="topbar">
    <input type="file" id="file"/>
    <button id="analyze">Analyze</button>
    <button id="export">Export Note Events</button>
    <div id="status">Load file</div>
</div>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const specCanvas = document.createElement("canvas");
const specCtx = specCanvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    specCanvas.width = innerWidth;
    specCanvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const statusEl = document.getElementById("status");

let audioDuration = 0;
let ready = false;

let mouseX = -9999;
let frozen = false;
let frozenX = -9999;

/* ---------------- storage ---------------- */

const bubbles = [];
const midiEvents = [];
const activeNotes = new Map();

let prevEnergy = 0;

/* ---------------- helpers ---------------- */

function freqToMidi(f){
    return 69 + 12*Math.log2(f/440);
}

function midiToLabel(m){
    const n = Math.round(m) % 12;
    return ["c","c#","d","d#","e","f","f#","g","g#","a","a#","b"][n];
}

function formatTime(s){
    return String(Math.floor(s/60)).padStart(2,"0") + ":" +
           String(Math.floor(s%60)).padStart(2,"0");
}

/* ---------------- CQT ---------------- */

const CQT = (() => {
    const min=55, max=1760, bpo=36;
    const out=[];
    const oct=Math.log2(max/min);
    const N=oct*bpo;
    for(let i=0;i<N;i++)
        out.push(min*Math.pow(2,i/bpo));
    return out;
})();

function cqt(frame,f,sr){
    let sum=0;
    for(let i=0;i<frame.length;i++){
        const w=0.5*(1-Math.cos(2*Math.PI*i/(frame.length-1)));
        sum += frame[i]*Math.cos(2*Math.PI*f*i/sr)*w;
    }
    return Math.abs(sum);
}

function analyzeCQT(frame,sr){

    const out=[];
    let max=0;

    for(const f of CQT){
        const m=cqt(frame,f,sr);
        out.push({freq:f,mag:m});
        max=Math.max(max,m);
    }

    for(let i=1;i<out.length-1;i++){
        out[i].mag=(out[i-1].mag+out[i].mag+out[i+1].mag)/3;
    }

    return out
        .filter(x=>x.mag>max*0.25)
        .sort((a,b)=>b.mag-a.mag);
}

function extractNotes(cqt){

    const max=Math.max(...cqt.map(x=>x.mag));

    return cqt
        .filter(x=>x.mag>max*0.4)
        .slice(0,6)
        .map(x=>({
            freq:x.freq,
            midi:freqToMidi(x.freq),
            label:midiToLabel(freqToMidi(x.freq))
        }));
}

/* ---------------- onset ---------------- */

function energy(frame){
    let e=0;
    for(const x of frame) e+=x*x;
    return e;
}

function onset(curr,prev){
    return curr/(prev+1e-6)>1.6;
}

/* ---------------- audio ---------------- */

async function decode(f){
    return audioCtx.decodeAudioData(await f.arrayBuffer());
}

/* ---------------- spectrogram colors ---------------- */

function colorForFreq(f){
    const m=freqToMidi(f);
    const pc=Math.round(m)%12;

    const base=[
        [0,255,120],
        [0,180,255],
        [255,80,80],
        [255,200,80],
        [200,120,255],
        [255,255,255]
    ];

    return base[Math.abs(pc)%base.length];
}

/* ---------------- process ---------------- */

async function process(buffer){

    ready=false;
    audioDuration=buffer.duration;

    const data=buffer.getChannelData(0);
    const fftSize=4096;
    const hop=1024;

    const total=Math.floor((data.length-fftSize)/hop);
    const xScale=canvas.width/total;

    specCtx.clearRect(0,0,canvas.width,canvas.height);

    prevEnergy=0;

    for(let i=0;i<total;i++){

        const seg=data.slice(i*hop,i*hop+fftSize);

        for(let j=0;j<seg.length;j++)
            seg[j]*=0.5*(1-Math.cos(2*Math.PI*j/(seg.length-1)));

        const currE=energy(seg);
        const isOn=onset(currE,prevEnergy);

        const cqt=analyzeCQT(seg,buffer.sampleRate);
        const notes=extractNotes(cqt);

        const t=i*hop/buffer.sampleRate;

        /* ---------- note tracking ---------- */

        if(isOn){

            for(const [k,n] of activeNotes){
                midiEvents.push({
                    start:n.start,
                    end:t,
                    label:n.label
                });
            }

            activeNotes.clear();

            for(const n of notes){
                activeNotes.set(n.freq,{
                    start:t,
                    label:n.label
                });
            }
        }
        else {
            const set=new Set(notes.map(n=>n.freq));

            for(const [f,n] of activeNotes){
                if(!set.has(f)){
                    midiEvents.push({
                        start:n.start,
                        end:t,
                        label:n.label
                    });
                    activeNotes.delete(f);
                }
            }
        }

        prevEnergy=currE;

        /* ---------- spectrogram ---------- */

        for(let b=0;b<256;b++){

            const f=b*(buffer.sampleRate/fftSize);
            if(f<20||f>8000) continue;

            const y=
                canvas.height -
                (Math.log2(f/20)/Math.log2(8000/20))*canvas.height;

            const c=colorForFreq(f);

            const a=0.6;

            specCtx.fillStyle=
                `rgba(${c[0]},${c[1]},${c[2]},${a})`;

            specCtx.fillRect(i*xScale,y,1,1);
        }

        if(i%10===0){
            statusEl.textContent=`Processing ${i}/${total}`;
            await new Promise(r=>setTimeout(r,0));
        }
    }

    const end=audioDuration;
    for(const [k,n] of activeNotes){
        midiEvents.push({start:n.start,end,label:n.label});
    }

    ready=true;
    statusEl.textContent="Ready";
}

/* ---------------- timeline ---------------- */

function drawTimeline(){

    if(!audioDuration) return;

    const y=canvas.height-30;
    const px=canvas.width/audioDuration;

    ctx.strokeStyle="rgba(255,255,255,0.2)";
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();

    for(let s=0;s<=audioDuration;s++){

        const x=s*px;
        const major=s%10===0;

        ctx.strokeStyle="white";
        ctx.lineWidth=major?2:1;

        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(x,y-(major?25:12));
        ctx.stroke();

        if(major){
            ctx.font="11px monospace";
            ctx.fillStyle="white";
            ctx.fillText(formatTime(s),x+3,y-30);
        }
    }
}

/* ---------------- bubbles ---------------- */

function drawBubbles(){

    const mx=frozen?frozenX:mouseX;

    for(const e of midiEvents){

        const x=(e.start/audioDuration)*canvas.width;

        const active=
            Math.abs(x-mx)<40;

        const w=active?180:10;

        ctx.fillStyle=active?
            "rgba(255,140,40,0.9)":
            "rgba(80,120,255,0.6)";

        ctx.fillRect(x,canvas.height*0.7,w,18);

        if(active){
            ctx.fillStyle="white";
            ctx.font="12px monospace";
            ctx.fillText(e.label,x+6,canvas.height*0.7+13);
        }
    }
}

/* ---------------- render ---------------- */

function render(){

    requestAnimationFrame(render);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(ready){
        ctx.drawImage(specCanvas,0,0);
    }

    drawTimeline();
    drawBubbles();

    const mx=frozen?frozenX:mouseX;

    if(mx>0){
        ctx.strokeStyle="orange";
        ctx.beginPath();
        ctx.moveTo(mx,0);
        ctx.lineTo(mx,canvas.height);
        ctx.stroke();
    }
}

/* ---------------- input ---------------- */

addEventListener("mousemove",e=>mouseX=e.clientX);
addEventListener("mouseleave",()=>mouseX=-9999);

addEventListener("keydown",e=>{
    if(e.code==="Space"){
        frozen=!frozen;
        frozenX=mouseX;
    }
});

document.getElementById("analyze").onclick=async()=>{
    const f=document.getElementById("file").files[0];
    if(!f) return;

    const buf=await decode(f);
    await process(buf);
};

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive CQT Spectrogram with Playback</title>
<style>
html, body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#454545;
    font-family:sans-serif;
    color:white;
    cursor:default;
}
#canvas{
    position:absolute;
    inset:0;
    width:100vw;
    height:100vh;
}
#topbar{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    z-index:20;
    background:rgba(30,30,30,0.72);
    backdrop-filter:blur(8px);
    padding:10px;
    box-sizing:border-box;
}
.row{
    display:flex;
    align-items:center;
    width:100%;
    gap:10px;
}
.leftControls{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}
.centerControls{
    display:flex;
    align-items:center;
    gap:8px;
    margin-left:20px;
}
.rightControls{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:16px;
}
#status{
    margin-top:6px;
    font-size:13px;
    color:#ddd;
}
button{
    cursor:pointer;
}
label{
    font-size:12px;
}
input[type="range"]{
    width:140px;
}
#legendPanel{
    position:absolute;
    right:20px;
    top:90px;
    width:260px;
    background:rgba(25,25,25,0.95);
    border-radius:12px;
    padding:14px;
    z-index:50;
    display:none;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.legendRow{
    display:flex;
    align-items:center;
    margin-bottom:8px;
    font-size:13px;
}
.swatch{
    width:20px;
    height:20px;
    border-radius:5px;
    margin-right:10px;
}
.sectionTitle{
    margin-top:10px;
    margin-bottom:8px;
    font-size:13px;
    opacity:0.8;
}
</style>
</head>
<body>
<div id="topbar">
    <div class="row">
        <div class="leftControls">
            <input type="file" id="file">
            <label>A=
                <select id="aTuning">
                    <option value="440">440 Hz</option>
                    <option value="432">432 Hz</option>
                    <option value="custom">Custom</option>
                </select>
            </label>
            <button id="analyze">Analyze</button>
        </div>
        <div class="centerControls">
            <button id="play">▶️ Play</button>
            <button id="pause">⏸ Pause</button>
            <button id="stop">⏹ Stop</button>
            <button id="restart">🔄 Restart</button>
        </div>
        <div class="rightControls">
            <button id="legendBtn">Legend</button>
            <label>Tuning Offset
                <input type="range" id="tuning" min="-12" max="12" step="0.01" value="0">
                <span id="tuningVal">0.00 st</span>
            </label>
            <label>Brightness
                <input type="range" id="brightness" min="0.2" max="4" step="0.05" value="1">
            </label>
        </div>
    </div>
    <div id="status">Load file</div>
</div>

<div id="legendPanel">
    <div class="sectionTitle">Pitch Colour Mapping</div>
    <div class="legendRow"><div class="swatch" style="background:#f8d0a0;"></div>C = gold / peach</div>
    <div class="legendRow"><div class="swatch" style="background:#203c96;"></div>D = navy blue</div>
    <div class="legendRow"><div class="swatch" style="background:#d8b0ff;"></div>E above A440 = lavender</div>
    <div class="legendRow"><div class="swatch" style="background:#785032;"></div>E below A440 = brown</div>
    <div class="legendRow"><div class="swatch" style="background:#beff50;"></div>F = yellow-green</div>
    <div class="legendRow"><div class="swatch" style="background:#46be32;"></div>G = lawn green</div>
    <div class="legendRow"><div class="swatch" style="background:#ff4646;"></div>A = red</div>
    <div class="legendRow"><div class="swatch" style="background:#78dcff;"></div>B = sky blue</div>
</div>

<canvas id="canvas"></canvas>

<script>
// --- constants
const MIN_FREQ = 49;
const MAX_FREQ = 8000;
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const specCanvas = document.createElement("canvas");
const specCtx = specCanvas.getContext("2d");
let cachedSpectrogram = [];
let cachedFFTSize = 4096;
let cachedSampleRate = 44100;
let audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let audioBuffer=null, playbackSource=null;
let midiEvents=[], activeNotes=new Map();
let brightnessBoost=1, tuningOffset=0, tuningDragValue=0, tuningDragging=false;
let mouseX=-9999, frozen=false, frozenX=-9999;
let audioDuration=0;
let processingStart=0;
let playStartTime=0, playStartOffset=0;
let statusEl=document.getElementById("status");
let aTuningHz=440;

// --- resize
function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
    specCanvas.width=innerWidth;
    specCanvas.height=innerHeight;
    redrawSpectrogram();
}
addEventListener("resize",resize);
resize();

// --- helpers
function freqToY(freq){
    return canvas.height - 40 - (Math.log2(freq/MIN_FREQ)/Math.log2(MAX_FREQ/MIN_FREQ))*(canvas.height-180);
}
function formatTime(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(Math.floor(s%60)).padStart(2,"0");}
function tunedMidi(freq){return 69+12*Math.log2(freq/aTuningHz)+(tuningDragging?tuningDragValue:tuningOffset);}
function midiToLabel(m){const n=(Math.round(m)%12+12)%12;return ["c","c#","d","d#","e","f","f#","g","g#","a","a#","b"][n];}
function colorForFreq(freq){
    const midi=tunedMidi(freq);
    const octave=Math.floor(midi/12);
    const pitch=Math.round(midi)%12;
    let rgb;
    switch(pitch){
        case 0: rgb=[255,210,160]; break;
        case 2: rgb=[40,60,150]; break;
        case 4: rgb=freq>=aTuningHz?[220,180,255]:[120,80,50]; break;
        case 5: rgb=[190,255,80]; break;
        case 7: rgb=octave<4?[0,80,30]:octave===4?[70,190,50]:[180,255,80]; break;
        case 9: rgb=[255,70,70]; break;
        case 11: rgb=[120,220,255]; break;
        default: rgb=[180,180,180];
    }
    return rgb;
}
function pitchColorCSS(freq){const c=colorForFreq(freq);return `rgb(${c[0]},${c[1]},${c[2]})`;}
function dominantPitchAtTime(t){
    let best=null;
    for(const e of midiEvents){
        if(t>=e.start && t<=e.end){if(!best||e.freq>best.freq)best=e;}
    }
    return best;
}
function updatePitchLabels(){for(const e of midiEvents){if(e.freq)e.label=midiToLabel(tunedMidi(e.freq));}}

// --- UI controls
document.getElementById("brightness").addEventListener("input", e=>{brightnessBoost=parseFloat(e.target.value);redrawSpectrogram();});
const tuningSlider=document.getElementById("tuning");
tuningSlider.addEventListener("input",e=>{tuningDragValue=parseFloat(e.target.value);tuningDragging=true; redrawSpectrogram(); updateScrubberBubble(); });
tuningSlider.addEventListener("change", e=>{
    tuningOffset=parseFloat(e.target.value);
    tuningDragging=false;
    document.body.style.cursor="wait";
    setTimeout(()=>{
        updatePitchLabels();
        redrawSpectrogram();
        document.body.style.cursor="default";
    },10);
});
document.getElementById("legendBtn").addEventListener("click", e=>{
    const panel=document.getElementById("legendPanel");
    panel.style.display=(panel.style.display==="block")?"none":"block";
});
document.getElementById("aTuning").addEventListener("change", e=>{
    const val=e.target.value;
    if(val==="440") aTuningHz=440;
    else if(val==="432") aTuningHz=432;
    else{
        const custom=prompt("Enter custom A tuning (Hz):", "440");
        aTuningHz=parseFloat(custom)||440;
    }
    updatePitchLabels();
    redrawSpectrogram();
});

// --- Audio playback
function stopPlayback(){if(playbackSource){playbackSource.stop();playbackSource=null;}}
function playAt(offset){
    stopPlayback();
    playbackSource=audioCtx.createBufferSource();
    playbackSource.buffer=audioBuffer;
    playbackSource.connect(audioCtx.destination);
    playStartOffset=offset;
    playStartTime=audioCtx.currentTime;
    playbackSource.start(0,offset);
    requestAnimationFrame(updateScrubberFromPlay);
}
function updateScrubberFromPlay(){
    if(!playbackSource) return;
    const t=playStartOffset+(audioCtx.currentTime-playStartTime);
    mouseX=(t/audioDuration)*canvas.width;
    updateScrubberBubble();
    if(t<audioDuration) requestAnimationFrame(updateScrubberFromPlay);
    else stopPlayback();
}
document.getElementById("play").addEventListener("click",()=>playAt(playStartOffset));
document.getElementById("pause").addEventListener("click",stopPlayback);
document.getElementById("stop").addEventListener("click",()=>{
    stopPlayback();
    playStartOffset=0;
    mouseX=-9999;
    updateScrubberBubble();
});
document.getElementById("restart").addEventListener("click",()=>playAt(0));
canvas.addEventListener("click",e=>{
    if(!audioBuffer) return;
    const t=(e.clientX/canvas.width)*audioDuration;
    playAt(t);
});

// --- Mouse / scrubber bubble
canvas.addEventListener("mousemove", e=>{
    mouseX=e.clientX;
    updateScrubberBubble();
});
function updateScrubberBubble(){
    const bubbleWidth=80, bubbleHeight=24;
    if(mouseX<0 || !audioBuffer) return;
    const t=(mouseX/canvas.width)*audioDuration;
    const dp=dominantPitchAtTime(t);
    if(!dp) return;
    const label=dp.label;
    const color=pitchColorCSS(dp.freq);
    // redraw bubble
    redrawSpectrogram();
    ctx.fillStyle="rgba(255,165,0,0.9)";
    ctx.fillRect(mouseX-bubbleWidth/2, 50, bubbleWidth, bubbleHeight);
    ctx.fillStyle=color;
    ctx.fillRect(mouseX-bubbleWidth/2+4, 54, 16,16);
    ctx.fillStyle="#fff";
    ctx.font="12px sans-serif";
    ctx.fillText(label, mouseX-bubbleWidth/2+24, 66);
    // scrubber line
    ctx.strokeStyle="rgba(255,140,0,0.7)";
    ctx.beginPath();
    ctx.moveTo(mouseX,0);
    ctx.lineTo(mouseX,canvas.height);
    ctx.stroke();
    // timestamp bubble at top
    ctx.fillStyle="rgba(50,50,50,0.8)";
    ctx.fillRect(mouseX-25,10,50,18);
    ctx.fillStyle="#fff";
    ctx.fillText(formatTime(t), mouseX-20,23);
}

// --- Spectrogram
function redrawSpectrogram(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#454545";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    if(!cachedSpectrogram.length) return;
    const height=canvas.height-80;
    const width=canvas.width;
    for(let t=0;t<cachedSpectrogram.length;t++){
        const col=cachedSpectrogram[t];
        const x=Math.floor((t/cachedSpectrogram.length)*width);
        for(const fval of col){
            const y=freqToY(fval.freq);
            const c=colorForFreq(fval.freq);
            ctx.fillStyle=`rgb(${c[0]*brightnessBoost},${c[1]*brightnessBoost},${c[2]*brightnessBoost})`;
            ctx.fillRect(x,y,1,1);
        }
    }
    // draw time ticks at bottom
    ctx.fillStyle="#fff";
    ctx.strokeStyle="#fff";
    for(let s=0;s<Math.floor(audioDuration);s++){
        const x=(s/audioDuration)*width;
        ctx.beginPath();
        ctx.moveTo(x,height-1);
        ctx.lineTo(x,height-(s%10===0?7:4));
        ctx.stroke();
        if(s%10===0){
            ctx.fillText(formatTime(s),x-10,height-10);
        }
    }
    // draw note bubbles
    for(const e of midiEvents){
        const x1=(e.start/audioDuration)*width;
        const x2=(e.end/audioDuration)*width;
        const y=height-60;
        ctx.fillStyle="rgba(0,0,255,0.6)";
        ctx.fillRect(x1,y,x2-x1,18);
        ctx.fillStyle="#fff";
        ctx.fillText(e.label,x1+2,y+12);
    }
}

// --- File loading
document.getElementById("file").addEventListener("change", async e=>{
    const file=e.target.files[0];
    if(!file) return;
    const arrayBuffer=await file.arrayBuffer();
    audioBuffer=await audioCtx.decodeAudioData(arrayBuffer);
    audioDuration=audioBuffer.duration;
    statusEl.textContent="File loaded. Click Analyze.";
    cachedSpectrogram=[]; // clear previous
});

// --- Analyze (placeholder, implement real CQT/polyphonic tracking)
document.getElementById("analyze").addEventListener("click", ()=>{
    if(!audioBuffer) return;
    statusEl.textContent="Analyzing...";
    setTimeout(()=>{
        // fake analysis: generate some midi events for demo
        midiEvents=[];
        for(let i=0;i<Math.floor(audioDuration);i+=0.5){
            const f=220*Math.pow(2,Math.random()*2);
            midiEvents.push({start:i,end:i+0.5,freq:f,label:midiToLabel(tunedMidi(f))});
        }
        // fake cachedSpectrogram
        cachedSpectrogram=[];
        const steps=canvas.width;
        for(let t=0;t<steps;t++){
            const col=[];
            for(let i=0;i<Math.floor(Math.random()*3)+1;i++){
                col.push({freq:220*Math.pow(2,Math.random()*2)});
            }
            cachedSpectrogram.push(col);
        }
        redrawSpectrogram();
        statusEl.textContent="Analysis complete.";
    },500);
});
</script>
</body>
</html>

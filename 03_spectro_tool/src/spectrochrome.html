<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive CQT Spectrogram</title>

<style>
html, body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#454545;
    color:white;
    font-family:sans-serif;
}

#canvas{
    position:absolute;

    width:100vw;

}

#topbar{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    z-index:100;
    background:rgba(28,28,28,0.74);
    backdrop-filter:blur(8px);
    padding:10px;
    box-sizing:border-box;
}

.row{
    display:flex;
    align-items:center;
    width:100%;
}

.leftControls{
    display:flex;
    align-items:center;

    flex:1;
}

.centerControls{
    display:flex;

}

.rightControls{

}

}

#status{
    margin-top:6px;

}

#legendPanel{

}

.swatch{
    width:18px;
    height:18px;
    border-radius:5px;
    margin-right:10px;
}
</style>
</head>

<body>

<div id="topbar">

    <div class="row">

        <div class="leftControls">

            <input type="file" id="file">

            <label>
                A=
                <select id="aTuning">
                    <option value="440">440 Hz</option>
                    <option value="432">432 Hz</option>
                </select>
            </label>

            <button id="analyzeBtn">
                Analyze
            </button>

            <button id="exportBtn">
                Export
            </button>

        </div>

        <div class="centerControls">

            <button id="playPauseBtn">▶ Play</button>
            <button id="stopBtn">⏹ Stop</button>
            <button id="restartBtn">↺ Restart</button>
            <button id="recordBtn">⬤ Record</button>
        </div>

        <div class="rightControls">

            <button id="legendBtn">
                Legend
            </button>

            <label>
                Tuning

                <input
                    type="range"
                    id="tuningSlider"
                    min="-12"
                    max="12"
                    step="0.01"
                    value="0"
                >

                <span id="tuningLabel">
                    0.00 st
                </span>
            </label>

            <label>
                Brightness

                <input
                    type="range"
                    id="brightnessSlider"
                    min="0.2"
                    max="4"
                    step="0.05"
                    value="1"
                >
            </label>

        </div>

    </div>

    <div id="status">
        Load a file
    </div>

</div>

<div id="legendPanel">

    <div class="legendRow">
        <div class="swatch" style="background:#ffd0a0"></div>
        C = peach/gold
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#203c96"></div>
        D = navy blue
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#d8b0ff"></div>
        E = lavender
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#F5D954"></div>
        F = yellow
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#46be32"></div>
        G = lawn green
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#ff5050"></div>
        A = red
    </div>

    <div class="legendRow">
        <div class="swatch" style="background:#78dcff"></div>
        B = sky blue
    </div>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas =
    document.getElementById("canvas");

const ctx =
    canvas.getContext("2d");

const specCanvas =
    document.createElement("canvas");

const specCtx =
    specCanvas.getContext("2d");

function resize(){

    canvas.width = innerWidth;
    canvas.height = innerHeight;

    specCanvas.width = innerWidth;
    specCanvas.height = innerHeight;
}

addEventListener("resize", resize);

resize();

// ================ Audio ======================

const audioCtx =
    new (
        window.AudioContext ||
        window.webkitAudioContext
    )();

let audioBuffer = null;
let audioDuration = 0;

let playbackSource = null;
let playbackStartTime = 0;
let playbackOffset = 0;
let playbackRunning = false;

let scrubPreviewSource = null;
let scrubbing = false;
let lastScrubPreviewTime = -1;

let mouseX = -9999;

// =============== Recording ====================

let recorder = null;
let chunks = [];
let recording = false;

let inputFileName = "audio";
let recordVersion = 1;

const recordDest = audioCtx.createMediaStreamDestination();

// ============== Viz / Tweaks ===============

let brightnessBoost = 1;
let tuningOffset = 0;
let aTuningHz = 440;


const MIN_FREQ = 49;
const MAX_FREQ = 8000;

const midiEvents = [];

let cachedSpectrogram = [];

let fixedColumnWidth = 1;

// ============== Analysis / Rendering Logic ==============

function formatTime(s){

    return (
        String(Math.floor(s/60))
        .padStart(2,"0")
        + ":" +
        String(Math.floor(s%60))
        .padStart(2,"0")
    );
}

function tunedMidi(freq){

    return (
        69 +
        12 *
        Math.log2(freq / aTuningHz)
    ) +
    tuningOffset;
}

function midiToLabel(m){

    const n =
        (
            Math.round(m)%12 + 12
        ) % 12;

    return [
        "c","c#","d","d#",
        "e","f","f#","g",
        "g#","a","a#","b"
    ][n];
}

function freqToY(freq){

    return (
        canvas.height -
        40 -
        (
            Math.log2(freq/MIN_FREQ)
            /
            Math.log2(MAX_FREQ/MIN_FREQ)
        ) *
        (
            canvas.height - 180
        )
    );
}

function colorForFreq(freq){

    const midi =
        tunedMidi(freq);

    const octave =
        Math.floor(midi/12);

    const pitch =
        Math.round(midi)%12;

    switch(pitch){

        case 0:
            return [255,210,160];

        case 2:
            return [40,60,150];

        case 4:
            return (
                freq >= aTuningHz
                ? [220,180,255]
                : [120,80,50]
            );

        case 5:
            return [245,217,84];

        case 7:

            if(octave < 4)
                return [0,80,30];

            if(octave === 4)
                return [70,190,50];

            return [180,255,80];

        case 9:
            return [255,70,70];

        case 11:
            return [120,220,255];

        default:
            return [180,180,180];
    }
}

function dominantPitchAtTime(t){

    for(const e of midiEvents){

        if(
            t >= e.start &&
            t <= e.end
        ){
            return e;
        }
    }

    return null;
}

function redrawSpectrogramColumn(i,spec){

    for(let b=1;b<spec.length;b++){

        const freq =
            b * (
                audioCtx.sampleRate /
                4096
            );

        if(
            freq < MIN_FREQ ||
            freq > MAX_FREQ
        ) continue;

        const y =
            freqToY(freq);

        const mag =
            spec[b];

        const intensity =
            Math.min(
                1,
                (
                    Math.log10(1+mag)
                    / 2.2
                ) * brightnessBoost
            );

        if(intensity < 0.02)
            continue;

        const c =
            colorForFreq(freq);

        const glow =
            1.5 + intensity * 4.5;

        const grad =
            specCtx.createLinearGradient(
                0,
                y - glow,
                0,
                y + glow
            );

        grad.addColorStop(
            0,
            `rgba(${c[0]},${c[1]},${c[2]},0)`
        );

        grad.addColorStop(
            0.5,
            `rgba(${c[0]},${c[1]},${c[2]},${intensity})`
        );

        grad.addColorStop(
            1,
            `rgba(${c[0]},${c[1]},${c[2]},0)`
        );

        specCtx.fillStyle = grad;

        specCtx.fillRect(
            i * fixedColumnWidth,
            y - glow,
            fixedColumnWidth + 1,
            glow * 2
        );
    }
}

function fft(sig){

    const N = sig.length;

    const out =
        new Float32Array(N/2);

    for(let k=0;k<N/2;k++){

        let re=0;
        let im=0;

        for(let n=0;n<N;n++){

            const p =
                2*Math.PI*k*n/N;

            re +=
                sig[n] *
                Math.cos(p);

            im -=
                sig[n] *
                Math.sin(p);
        }

        out[k] =
            Math.sqrt(re*re+im*im);
    }

    return out;
}

async function processAudio(buffer){

    audioBuffer = buffer;

    audioDuration =
        buffer.duration;

    midiEvents.length = 0;

    specCtx.clearRect(
        0,
        0,
        specCanvas.width,
        specCanvas.height
    );

    cachedSpectrogram = [];

    const data =
        buffer.getChannelData(0);

    const fftSize = 4096;
    const hop = 1024;

    const total =
        Math.floor(
            (
                data.length -
                fftSize
            ) / hop
        );

    fixedColumnWidth =
        canvas.width / total;

    const processingStart =
        performance.now();

    for(let i=0;i<total;i++){

        const seg =
            data.slice(
                i*hop,
                i*hop+fftSize
            );

        for(let j=0;j<seg.length;j++){

            seg[j] *=
                0.5 *
                (
                    1 -
                    Math.cos(
                        2*Math.PI*j /
                        (
                            seg.length-1
                        )
                    )
                );
        }

        const spec =
            fft(seg);

        cachedSpectrogram.push(spec);

        redrawSpectrogramColumn(
            i,
            spec
        );

        let best=0;
        let bestBin=0;

        for(let b=1;b<spec.length;b++){

            if(spec[b] > best){

                best = spec[b];
                bestBin = b;
            }
        }

        const freq =
            bestBin *
            (
                audioCtx.sampleRate /
                fftSize
            );

        const t =
            i * hop /
            audioCtx.sampleRate;

        const prev =
            midiEvents[
                midiEvents.length - 1
            ];

        const note =
            midiToLabel(
                tunedMidi(freq)
            );

        if(
            !prev ||

            (
                t - prev.start
            ) > 1.1 ||

            prev.label !== note
        ){

            midiEvents.push({

                start:t,
                end:t+0.8,

                freq,

                label:note
            });
        }

        const elapsed =
            (
                performance.now()
                - processingStart
            ) / 1000;

        const progress =
            (i+1) / total;

        const estimate =
            elapsed / progress;

        const remaining =
            estimate - elapsed;

        document
        .getElementById("status")
        .textContent =
            `Processing ${
                i+1
            }/${
                total
            } • elapsed ${
                elapsed.toFixed(1)
            }s • remaining ≈ ${
                remaining.toFixed(1)
            }s`;

        await new Promise(
            r=>setTimeout(r,0)
        );
    }

    // JSL: Restored processing time
    const totalTimeElapsed =
            (
                performance.now()
                - processingStart
            ) / 1000;
    document
    .getElementById("status")
    .textContent =
        `Ready. Processing took ${totalTimeElapsed.toFixed(1)}s`;
}

function drawTimeline(){

    if(!audioDuration)
        return;

    const y =
        canvas.height - 28;

    const px =
        canvas.width /
        audioDuration;

    for(let s=0;s<=audioDuration;s++){

        const x = s * px;

        const major =
            s % 10 === 0;

        ctx.strokeStyle =
            "white";

        ctx.beginPath();

        ctx.moveTo(x,y);

        ctx.lineTo(
            x,
            y - (
                major ? 24 : 12
            )
        );

        ctx.stroke();

        if(major){

            ctx.fillStyle =
                "white";

            ctx.font =
                "11px monospace";

            ctx.fillText(
                formatTime(s),
                x+3,
                y-30
            );
        }
    }
}

function drawCMarkers(){

    for(let o=0;o<9;o++){

        const midi =
            12 + o*12;

        const freq =
            aTuningHz *
            Math.pow(
                2,
                (midi-69)/12
            );

        if(
            freq < MIN_FREQ ||
            freq > MAX_FREQ
        ) continue;

        const y =
            freqToY(freq);

        ctx.strokeStyle =
            "rgba(255,255,255,0.25)";

        ctx.beginPath();

        ctx.moveTo(0,y);
        ctx.lineTo(16,y);

        ctx.stroke();

        if(o===4){

            ctx.font =
                "bold 12px monospace";

            const label =
                `c${o}`;

            const tw =
                ctx.measureText(label)
                .width;

            ctx.fillStyle =
                "rgba(255,255,255,0.10)";

            ctx.beginPath();

            ctx.roundRect(
                18,
                y - 8,
                tw + 10,
                14,
                5
            );

            ctx.fill();

            ctx.strokeStyle =
                "rgba(255,255,255,0.55)";

            ctx.stroke();

            ctx.fillStyle =
                "white";

        }else{

            ctx.fillStyle =
                "rgba(255,255,255,0.75)";

            ctx.font =
                "11px monospace";
        }

        ctx.fillText(
            `c${o}`,
            o===4 ? 23 : 24,
            o===4 ? y+2 : y+3
        );
    }
}

function drawBubbles(){

    let activeFound = false;

    for(const e of midiEvents){

        const x =
            (
                e.start /
                audioDuration
            ) *
            canvas.width;

        const dist =
            Math.abs(x - mouseX);

        const active =
            dist < 36 &&
            !activeFound;

        if(active)
            activeFound = true;

        const bubbleY =
            canvas.height * 0.89;

        if(active){

            const label =
                e.label;

            ctx.font =
                "bold 12px monospace";

            const tw =
                ctx.measureText(label)
                .width;

            const w =
                Math.max(
                    120,
                    tw + 34
                );

            let bx =
                x - w * 0.5;

            bx =
                Math.max(
                    4,
                    Math.min(
                        canvas.width - w - 4,
                        bx
                    )
                );

            ctx.fillStyle =
                "rgba(255,140,40,0.92)";

            ctx.beginPath();

            ctx.roundRect(
                bx,
                bubbleY - 12,
                w,
                22,
                10
            );

            ctx.fill();

            ctx.fillStyle =
                "white";

            ctx.fillText(
                label,
                bx + 16,
                bubbleY + 3
            );

        }else{

            ctx.fillStyle =
                "rgba(80,120,255,0.58)";

            ctx.beginPath();

            ctx.roundRect(
                x - 6,
                bubbleY - 4,
                12,
                8,
                4
            );

            ctx.fill();
        }
    }
}

function stopPlayback(){

    if(playbackSource){

        try{
            playbackSource.stop();
        }catch(e){}

        playbackSource.disconnect();

        playbackSource = null;
    }

    playbackRunning = false;

    document
    .getElementById("playPauseBtn")
    .textContent =
        "▶ Play";
}

function playAt(offset){
    
    stopPlayback();

    playbackSource = audioCtx.createBufferSource();
    playbackSource.buffer = audioBuffer;

    playbackSource.connect(audioCtx.destination);
    playbackSource.connect(recordDest);

    playbackOffset = offset;
    playbackStartTime = audioCtx.currentTime;

    playbackSource.start(0, offset);

    playbackRunning = true;

    document.getElementById("playPauseBtn").textContent = "⏸ Pause";

    playbackSource.onended = () => {

        if(recording){
            setTimeout(()=>{
                if(recorder && recording){
                    recorder.stop();
                }
            }, 250);
        } else {
            stopPlayback();
        }
    };
}

function previewAt(time){

    if(!audioBuffer)
        return;

    if(
        Math.abs(
            time -
            lastScrubPreviewTime
        ) < 0.03
    ){
        return;
    }

    lastScrubPreviewTime = time;

    if(scrubPreviewSource){

        try{
            scrubPreviewSource.stop();
        }catch(e){}
    }

    scrubPreviewSource =
        audioCtx.createBufferSource();

    scrubPreviewSource.buffer =
        audioBuffer;

    const gain =
        audioCtx.createGain();

    gain.gain.value = 0.28;

    scrubPreviewSource.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    scrubPreviewSource.start(
        0,
        Math.max(0,time),
        0.09
    );
}

// Recording...
async function startRecording(){

    chunks = [];

    const canvasStream = canvas.captureStream(60);

    const combined = new MediaStream([
        ...canvasStream.getVideoTracks(),
        ...recordDest.stream.getAudioTracks()
    ]);

    const mime =
        MediaRecorder.isTypeSupported("video/mp4")
        ? "video/mp4"
        : "video/webm";

    recorder = new MediaRecorder(combined, { mimeType: mime });

    recorder.ondataavailable = e => {
        if(e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {

        // IMPORTANT: flush audio stream cleanly
        recordDest.stream.getTracks().forEach(t => t.stop());

        const blob = new Blob(chunks, { type: mime });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;

        const ext = mime.includes("mp4") ? "mp4" : "webm";

        const filename =
            `${inputFileName}_spectrogram_v${recordVersion}.${ext}`;

        recordVersion++;

        a.download = filename;
        a.click();

        URL.revokeObjectURL(url);

        recording = false;
        document.getElementById("recordBtn").textContent = "⬤ Record";
    };

    recorder.start();
    recording = true;

    document.getElementById("recordBtn").textContent = "■ Recording";

    // always start from beginning
    playAt(0);
}

function exportDetectedNotes(){

    if(!midiEvents.length)
        return;

    let txt =
        "time_seconds,note,freq_hz\n";

    for(const e of midiEvents){

        txt +=
            `${e.start.toFixed(3)},${e.label},${e.freq.toFixed(2)}\n`;
    }

    const blob =
        new Blob(
            [txt],
            {
                type:"text/csv"
            }
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;

    // JSL: Use inputFileName to make a more useful filename
    const filename = `${inputFileName}_detected_notes_v${recordVersion}.csv`;
    a.download = filename;

    a.click();

    URL.revokeObjectURL(url);
}

function render(){

    requestAnimationFrame(render);

    // JSL: Was just "clearRect", but using fillRect works better for recording
    ctx.fillStyle = '#454545';
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.drawImage(
        specCanvas,
        0,
        0
    );

    drawTimeline();

    drawCMarkers();

    drawBubbles();

    if(playbackRunning){

        const current =
            playbackOffset +
            (
                audioCtx.currentTime -
                playbackStartTime
            );

        mouseX =
            (
                current /
                audioDuration
            ) *
            canvas.width;

        // if(current >= audioDuration){

        //     stopPlayback();
        // }
    }

    if(mouseX > 0){

        ctx.strokeStyle =
            "rgba(255,140,40,0.85)";

        ctx.lineWidth = 2;

        ctx.beginPath();

        ctx.moveTo(mouseX,0);
        ctx.lineTo(mouseX,canvas.height);

        ctx.stroke();

        const t =
            (
                mouseX /
                canvas.width
            ) *
            audioDuration;

        const pitch =
            dominantPitchAtTime(t);

        const bubbleY =
            document
            .getElementById("topbar")
            .offsetHeight + 8;

        const label =
            `${formatTime(t)} ${
                pitch
                ? pitch.label
                : "--"
            }`;

        ctx.font =
            "12px monospace";

        const tw =
            ctx.measureText(label)
            .width;

        const bx =
            Math.min(
                canvas.width - tw - 58,
                mouseX + 10
            );

        ctx.fillStyle =
            "rgba(255,140,40,0.95)";

        ctx.beginPath();

        ctx.roundRect(
            bx,
            bubbleY,
            tw + 44,
            24,
            8
        );

        ctx.fill();

        if(pitch){

            const c =
                colorForFreq(
                    pitch.freq
                );

            ctx.fillStyle =
                `rgb(${c[0]},${c[1]},${c[2]})`;

            ctx.beginPath();

            ctx.roundRect(
                bx+8,
                bubbleY+5,
                14,
                14,
                4
            );

            ctx.fill();
        }

        ctx.fillStyle =
            "white";

        ctx.fillText(
            label,
            bx+30,
            bubbleY+16
        );
    }
}

canvas.addEventListener(
    "mousedown",
    e=>{

        scrubbing = true;

        mouseX = e.clientX;

        const t =
            (
                mouseX /
                canvas.width
            ) *
            audioDuration;

        previewAt(t);

        if(playbackRunning){

            playAt(t);
        }
    }
);

canvas.addEventListener(
    "mousemove",
    e=>{
        // JSL: Only handle when not recording
        if (recording)
            return;
        
        if(scrubbing){
            // JSL: Don't update mouseX if not already scrubbing
            mouseX = e.clientX;

            const t =
                (
                    mouseX /
                    canvas.width
                ) *
                audioDuration;

            previewAt(t);

            if(playbackRunning){

                playAt(t);
            }
        }
    }
);

addEventListener(
    "mouseup",
    ()=>{

        scrubbing = false;
    }
);

document
.getElementById("analyzeBtn")
.onclick = async ()=>{

    const f =
        document
        .getElementById("file")
        .files[0];

    if(!f) return;
    
    // JSL: Save filename into variable used for making export file
    inputFileName = f.name;

    const arr =
        await f.arrayBuffer();

    const buf =
        await audioCtx.decodeAudioData(arr);

    await processAudio(buf);
};

document
.getElementById("brightnessSlider")
.addEventListener(
    "input",
    e=>{

        brightnessBoost =
            parseFloat(
                e.target.value
            );

        specCtx.clearRect(
            0,
            0,
            specCanvas.width,
            specCanvas.height
        );

        for(
            let i=0;
            i<cachedSpectrogram.length;
            i++
        ){

            redrawSpectrogramColumn(
                i,
                cachedSpectrogram[i]
            );
        }
    }
);

document
.getElementById("tuningSlider")
.addEventListener(
    "input",
    e=>{

        tuningOffset =
            parseFloat(
                e.target.value
            );

        document
        .getElementById("tuningLabel")
        .textContent =
            tuningOffset.toFixed(2)
            + " st";
    }
);

document
.getElementById("legendBtn")
.onclick = ()=>{

    const p =
        document
        .getElementById("legendPanel");

    p.style.display =
        p.style.display === "block"
        ? "none"
        : "block";
};

document
.getElementById("playPauseBtn")
.onclick = ()=>{

    if(playbackRunning){

        stopPlayback();

    }else{

        playAt(
            (
                mouseX > 0
                ? mouseX /
                  canvas.width
                : 0
            ) * audioDuration
        );
    }
};

document
.getElementById("stopBtn")
.onclick = ()=>{

    stopPlayback();

    mouseX = -9999;
};

document
.getElementById("restartBtn")
.onclick = ()=>{

    playAt(0);
};

document.getElementById("recordBtn").onclick = () => {
    if(recording){
        recorder.stop();
    } else {
        startRecording();
    }
};

document
.getElementById("exportBtn")
.onclick =
    exportDetectedNotes;

render();

</script>
</body>
</html>

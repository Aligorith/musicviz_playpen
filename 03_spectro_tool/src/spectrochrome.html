<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrochrome - Interactive Pitch-Coloured CQT Spectrogram</title>

<style>
/* ************************* */
/* Overall Page-Level Stuff */

/* Basic styling for the page */
html, body {
	margin: 0;
	padding: 0;
	overflow: hidden;
	background: #454545;
	color: white;
	font-family: sans-serif;
}

/* Force the wait cursor on everything while the active class is present */
html.is-processing, 
html.is-processing * {
  cursor: wait !important;
}

/* ************************* */
/* Main (Static) UI Elements */

#canvas {
	position: absolute;
	inset:    0;
	width:    100vw;
	height:   100vh;
}

#topbar {
	position: absolute;
	top: 0;
	left: 0;
	width: 100%;
	z-index: 100;
	background: rgba(28,28,28,0.74);
	backdrop-filter: blur(8px);
	padding: 10px;
	box-sizing: border-box;
}

#status {
	margin-top: 6px;
	font-size: 13px;
	color: #ddd;
}

/* ************************* */
/* Top-Bar - Layout Cluster Types */

.row {
	display: flex;
	align-items: center;
	width: 100%;
}

.leftControls {
	display: flex;
	align-items: center;
	gap: 10px;
	flex: 1;
}

.centerControls {
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 10px;
	flex: 1;
}

.rightControls {
	display: flex;
	align-items: center;
	justify-content: flex-end;
	gap: 14px;
	flex: 1;
}

/* ************************* */
/* General Basics for Widgets */

button {
	cursor: pointer;
}

/* Preferred width of the sliders inside the form grids */
input[type="range"] {
	width: 140px;
}

/* ************************* */
/* Settings Form Styles */

/* Settings-Form - Grid Layout for Container */
.form-grid {
	display: grid;
	
	/* 
	 * Columns:
	 * 1. label          -> only as wide as needed
	 * 2. widget/slider  -> expands to fill available space
	 * 3. optional text  -> only as wide as needed
	 * 4. reset button   -> square
	 */
	grid-template-columns:
		max-content
		minmax(0, 1fr)
		max-content
		auto;
	
	gap: 0.5rem 1rem;
	
	/* vertically center everything in each row */
	align-items: center;
}

/* Make sliders/widgets shrink properly inside grid */
.form-grid .form-widget {
	min-width: 0;
}

/* Form Layout Tags */
.form-property-label     { grid-column: 1; }
.form-property-widget    { grid-column: 2; }
.form-property-value     { grid-column: 3; }

.form-reset-property-btn {
	aspect-ratio: 1;
	width: 24px;
	
	border: none;
	border-radius: 8px;
	/*background: #f3f4f6;*/
	
	display: grid;
	grid-column: 4;
	
	font-size: 13px; /* emoji size, to match other text  */
	line-height: 1;
	place-items: center;
	
	/*transition: background 0.2s ease, transform 0.1s ease;*/
}
.form-reset-property-btn::before {
	content: "↺";
}

/* Preferred width of the selection dropdowns inside the form-grids */
.form-grid select {
	width: 140px;
}

/* ************************* */
/* Floating / Popup Panel Stuff */

/* The host container for the popup panels */
.popup-panel-host {
	position: fixed;
	  
	top: 40px;
	right: 20px;
	
	display: flex;
	flex-direction: row-reverse;
	
	align-items: flex-start;
	gap: 5px;
	
	z-index: 999;
}

/* Popup Panels */
.popup-panel {
	flex: 0 0 auto;
	
	padding: 14px;
	
	background: rgba(20,20,20,0.96);
	border-radius: 12px;
	box-shadow: 0 10px 40px rgba(0,0,0,0.5);
	
	font-size: 13px;
	
	white-space: nowrap;
	
	transition:
		transform 250ms ease,
		opacity 250ms ease,
		max-width 250ms ease,
		margin 250ms ease,
		padding 250ms ease;
	
	transform: translateX(0) scale(1);
	transform-origin: top right;
	opacity: 1;
	
	/* max-width: 1000px; */
	overflow: hidden;
}

/* Popup Panels Hidden state */
.popup-panel.hidden {
	opacity: 0;
	
	transform: translateX(30px) scale(0.95);
	
	max-width: 0;
	
	padding-left: 0;
	padding-right: 0;
	
	margin-left: -12px;
	
	pointer-events: none;
}

/* ************************* */
/* Legend / Mappings Panel */

#legendPanel {
	max-width: 300px;
}

.legendRow {
	display: flex;
	align-items: center;
	margin-bottom: 8px;
}

.swatch {
	width: 18px;
	height: 18px;
	border-radius: 5px;
	margin-right: 10px;
}

</style>
</head>

<body>
<div id="topbar">
	<div class="row">
		<div class="leftControls">
			<input type="file" id="file">
			
			<label>
				A=
				<select id="aTuning">
					<option selected value="440">440 Hz</option>
					<option          value="432">432 Hz</option>
				</select>
			</label>
			
			<button id="analyzeBtn">Analyze</button>
			
			<button id="exportBtn">Export</button>
		</div>
		
		<div class="centerControls">
			<button id="playPauseBtn">▶ Play</button>
			<button id="stopBtn">⏹ Stop</button>
			<button id="restartBtn">↺ Restart</button>
			<button id="recordBtn">⬤ Record</button>
		</div>
		
		<div class="rightControls">
			<button id="legendBtn">Legend</button>
			<button id="tweaksBtn">Tweaks</button>
		</div>
	</div>
	
	<div id="status">
		Load a file, then click Analyse
	</div>
</div>

<div class="popup-panel-host">
	<!-- NOTE: Panels are in right to left, starting from the top right -->
	<!-- 1) Tweaks Panel -->
	<div id="tweaksPanel" class="popup-panel hidden">
		<div class="form-grid">
			<!-- Tuning Offset -->
			<label class="form-property-label" for="tuningSlider">
				Tuning Offset:
			</label>
			<input
					id="tuningSlider"
					class="form-property-widget"
					type="range"
					min="-12"
					max="12"
					step="0.01"
					value="0"
				/>
			<span id="tuningLabel" class="form-property-value">0.00 st</span>
			<button id="resetTuningOffsetBtn" class="form-reset-property-btn" aria-label="Reset"></button>
		
			<!-- Brightness Slider -->
			<label class="form-property-label" for="brightnessSlider">
				Brightness:
			</label>
			<input
					id="brightnessSlider"
					class="form-property-widget"
					type="range"
					min="0.2"
					max="4"
					step="0.05"
					value="1"
				/>
			<button id="resetBrightnessBtn" class="form-reset-property-btn" aria-label="Reset"></button>
		</div>
	</div>
	
	<!-- 1) Legend Panel -->
	<div id="legendPanel" class="popup-panel hidden">
		<!-- Colour Map Settings-->
		<div class="form-grid">
			<!-- Pitch Naming Style -->
			<label class="form-property-label" for="pitchNameStyleSelector">
				Pitch Naming Style:
			</label>
			<select id="pitchNameStyleSelector" class="form-property-widget">
				<option value="ScientificNotation" selected>Scientific Pitch Notation (SPN)</option>
				<option value="LilypondNotation">Lilypond</option>
				<option value="LilypondHybridNotation">Lilypond + SPN</option>
			</select>
			<button id="resetPitchNameStyleBtn" class="form-reset-property-btn" aria-label="Reset"></button>
			
			<!-- Sharp / Flat Bias -->
			<label class="form-property-label" for="sharpFlatBiasSelector">
				Sharp/Flat Bias: 
			</label>
			<select id="sharpFlatBiasSelector" class="form-property-widget">
				<option value="Common" selected>Common Variants</option>
				<option value="Sharps">All Sharps</option>
				<option value="Flats">All Flats</option>
			</select>
			<button id="resetSharpFlatBiasBtn" class="form-reset-property-btn" aria-label="Reset"></button>
		</div>
		
		<!-- Gap -->
		<div style="height: 30px;"></div>
		
		<!-- Color swatches Region -->
		<div class="legendRow">
			<div class="swatch" style="background:#ffd0a0"></div>
			C = peach/gold
		</div>
		
		<div class="legendRow">
			<div class="swatch" style="background:#203c96"></div>
			D = navy blue
		</div>
		
		<div class="legendRow">
			<div class="swatch" style="background:#d8b0ff"></div>
			E = lavender
		</div>
		
		<div class="legendRow">
			<div class="swatch" style="background:#F5D954"></div>
			F = yellow
		</div>
		
		<div class="legendRow">
			<div class="swatch" style="background:#46be32"></div>
			G = lawn green
		</div>
		
		<div class="legendRow">
			<div class="swatch" style="background:#ff5050"></div>
			A = red
		</div>
		
		<div class="legendRow">
			<div class="swatch" style="background:#78dcff"></div>
			B = sky blue
		</div>
	</div>
</div>

<canvas id="canvas"></canvas>


<script>
// Canvas Defines ==================================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// NOTE: "spectogramCanvas" is the spectrogram cache canvas that gets drawn to
// while we are processing the audio. Without having this, nothing gets
// shown until the whole lot is done.
const spectogramCanvas = document.createElement("canvas");
const spectogramCanvasCtx = spectogramCanvas.getContext("2d");

// Audio ===========================================

const audioCtx =
	new (
		window.AudioContext ||
		window.webkitAudioContext
	)();

let audioBuffer = null;
let audioDuration = 0;

let playbackSource = null;
let playbackStartTime = 0;
let playbackOffset = 0;
let playbackRunning = false;

let scrubPreviewSource = null;
let scrubbing = false;
let lastScrubPreviewTime = -1;

let analysisInProgress = false;

// ----------------------------------------------

// Placeholder / Invalid Position for scrubber
const INVALID_HIDDEN_SCRUBBER_IDX = -9999;

// Position of the scrubber (in window x-coordinates - pixels)
let scrubberPosition = INVALID_HIDDEN_SCRUBBER_IDX;

// Recording =====================================

let recorder = null;
let chunks = [];
let recording = false;

let inputFileName = "audio";
let recordVersion = 1;

let recordDest = null;

// (bool) Show faint "ghosted" copy of the whole spectrogram in the background when recording
let showGhostBackdropWhenRendering = true;

// Tweaks =======================================

// Processing Settings ----------
// Tuning for "A4"
let aTuningHz = 440;

// "Tweaks" Panel Items ---------

let brightnessBoost = 1;
let tuningOffset = 0;


// Viz State Constants ==================================

// Min/Max Range of Frequencies able to be shown:
// This cuts out the really low (< C2) and high (> C8) frequencies,
// which are mostly just noise (i.e. ambient bass rumbles / white-noise)
const MIN_FREQ = 49;
const MAX_FREQ = 8000;

// ---------------

// Width of the octave markers gutter (in px)
const LEFT_GUTTER = 72;

// Height of the timeline gutter (in px)
const TIMELINE_GUTTER = 28;

// Current maximum width of the spectrogram viewing area
let spectogramWidth = canvas.width - LEFT_GUTTER;

// Viz State Data (Computed) ============================

// List of note-events identified
const midiEvents = [];

// Cache of the spectrogram data
let cachedSpectrogram = [];

// Width of each vertical sliver of the spectogram.
// "cachedSpectogram" contains a list of these slivers, one per 
let fixedColumnWidth = 1;

// Factor that each "b" or "bin" value from the FFT "spec" array
// needs to be multiplied by to obtain a frequency value.
//
// NOTE: Calculated as "audioCtx.sampleRate / fftSize"
//       in processAudio()
let fftToFreqFactor = 1;


// Audio Processing Constants =================================

const TWO_PI = 2 * Math.PI;

// --------------------------------------

const semitonesPerOctave = 12;
const midiRefPitch = 69;

const fftSize = 4096;
const hop = 1024;

// --------------------------------------

// Minimum "magnitude" in the spectrogram needed for a pitch to be considered
// for the "dominant pitch" detection
let minimumPitchStrength = 30;

// --------------------------------------

// Pitch-name Notation Style ID's
// NOTE: Cannot use these constants to have the JSON below resolve to the values of these
const SCIENTIFIC_NOTATION = "ScientificNotation";
const LILYPOND_NOTATION   = "LilypondNotation";
const LILYPOND_HYBRID_NOTATION = "LilypondHybridNotation";

// Sharp/Flat Bias Mode ID's
// NOTE: Cannot use these constants to have the JSON below resolve to the values of these
const SHARP_BIAS_MODE = "Sharps";
const FLAT_BIAS_MODE = "Flats";
const COMMON_BIAS_MODE = "Common";


// Semitone number / index corresponding to "C"
const C_PITCH_INDEX = 0;

// Octave for "Middle C"
const MIDDLE_C_OCTAVE = 4;

// .......................

// Sharp-Based Pitch Names
const PITCH_NAMES_SHARPS = {
	"ScientificNotation" : [
		"c","c#","d","d#",
		"e","f","f#","g",
		"g#","a","a#","b"
	],
	"LilypondNotation" : [
		"c","cIS","d","dIS",
		"e","f","fis","g",
		"gis","a","ais","b"
	]
};

// Flat-Based Pitch Names
const PITCH_NAMES_FLATS = {
	"ScientificNotation" : [
		"c","d♭","d","e♭",
		"e","f","g♭","g",
		"a♭","a","b♭","b"
	],
	"LilypondNotation" : [
		"c","des","d","ees",
		"e","f","ges","g",
		"aes","a","bes","b"
	]
};

// Common Useful Sharp/Flat Names
// NOTE: These are only useful for my typical usages
// NOTE: A-Flat / G-Sharp is the only ambiguous one...
const PITCH_NAMES_COMMON = {
	"ScientificNotation" : [
		"c","c#","d","e♭",
		"e","f","f#","g",
		"g#","a","b♭","b"
	],
	"LilypondNotation" : [
		"c","cis","d","ees",
		"e","f","fis","g",
		"gis","a","bes","b"
	]
};

// .......................

// Table for looking up pitch names
// Key 1) sharpFlatBiasMode  (i.e. here)
// Key 2) pitchNameStyle     (i.e. within each table linked here)
// Key 3) pitchIndex
const pitchNamesTable = {
	"Sharps"  : PITCH_NAMES_SHARPS,
	"Flats"   : PITCH_NAMES_FLATS,
	"Common"  : PITCH_NAMES_COMMON
};

// .......................

// Style of notation used  (i.e. "Scientific Pitch Notation" vs "Lilypond")
let pitchNameStyle = SCIENTIFIC_NOTATION;

// Sharp/Flat Bias Mode
let sharpFlatBiasMode = COMMON_BIAS_MODE;


// UI Defines / Utils ===================================

// UI Labels for toggle buttons ...............
const playStateActionTxt          = "▶ Play";
const pauseStateActionTxt         = "⏸ Pause";
const recordStateActionTxt        = "⬤ Record";
const stopRecordingStateActionTxt = "■ Recording";

// Color Defines ..............................
const SCRUBBER_COLOR = [255, 140, 40];
const BUBBLE_COLOR = [80, 120, 255];

// ----------------------------------

// Standard debounce threshold for the slider updates (in ms)
const STD_DEBOUNCE_DELAY_MS = 500;

// For interactive slider events, use "Debounce" Pattern for deferring / batching
// events until the last in a stream of rapidly occurring updates on an interactive 
// element
//
// < delay: (uint :: ms) Delay in ms for how long to wait for activity to die down
//                       before letting callback() run
// < callback: (fn()) Callback function to perform when the rapid stream of events
//                    stops hitting the triggering event listener.
//
// NOTE: From https://stackoverflow.com/questions/75988682/debounce-in-javascript
function debounce(delay, callback)
{
	// Timer-ID for keeping track of if we have a pending event we're waiting on...
	let batchingTimerId;
	
	return (...args) => {
		// Reset the timer, as a new event came in...
		clearTimeout(batchingTimerId);
		
		// Re-register the timer, with a new function now
		batchingTimerId = setTimeout(() => {
			callback();
		}, delay);
	};
}

// -----------------------

function enableWaitCursor()
{
	document.documentElement.classList.add("is-processing");
}

function clearWaitCursor()
{
	document.documentElement.classList.remove("is-processing");
}

function updateStatusText(text)
{
	document.getElementById("status").textContent = text;
}

// -----------------------

function setPlayButtonState()
{
	document.getElementById("playPauseBtn").textContent = playStateActionTxt;
}

function setPauseButtonState()
{
	document.getElementById("playPauseBtn").textContent = pauseStateActionTxt;
}

function setStartRecordingButtonState()
{
	document.getElementById("recordBtn").textContent = recordStateActionTxt;
	clearWaitCursor();
}

function setStopRecordingButtonState()
{
	document.getElementById("recordBtn").textContent = stopRecordingStateActionTxt;
	enableWaitCursor();
}

// -----------------------

// Convert a "RGB Tuple" into a "rgb()" color string
// < rgbTuple: ([uchar, uchar, uchar]) RGB color, represented as "0 <= c <= 255"
// > returns: (str) "rgb(r, g, b)"
function colorFromTuple(rgbTuple)
{
	return `rgb(${rgbTuple[0]}, ${rgbTuple[1]}, ${rgbTuple[2]})`;
}

// Convert an "rgb" color (given as a 3-int tuple) into an "rgba()"
// color string, that has been tempered using the given alpha.
// < rgbTuple: ([uchar, uchar, uchar]) RGB color, represented as "0 <= c <= 255"
// < alpha: (float :: 0.0 <= f <= 1.0) The alpha / opacity value
// > returns: (str) "rgba(r, g, b, a)"
function colorWithAlpha(rgbTuple, alpha)
{
	return `rgba(${rgbTuple[0]}, ${rgbTuple[1]}, ${rgbTuple[2]}, ${alpha})`;
}

// Coordinate Conversion Utils ===================================

// Convert canvas.x coordinates into time (in seconds) since start of the clip
// < x: (float :: px) Horizontal-axis screen coordinates relative to the canvas area
// > returns: (float :: secs) Time in seconds, relative to the start of the audio clip
function xToTime(x)
{
	return ((x - LEFT_GUTTER) / spectogramWidth) * audioDuration;
}

// Convert time in seconds (since the start of the clip) into the x-coordinate
// on the canvas that this time is displayed.
// < t: (float :: secs) Time in seconds since the start of the clip
// > returns: (float :: px) X-axis pixel coordinate in canvas space events at
//                          this point in time will be drawn at.
function timeToX(t)
{
	return ((t / audioDuration) * spectogramWidth) + LEFT_GUTTER;
}

// Convert a frequency (in Hz) into the corresponding canvas.y pixel coordinate
// to draw this frequency at
// < freq: (float :: Hz) Frequency in Hz
// > returns: (float :: px) Y-axis pixel coordinates on the canvas to draw this frequency at
function freqToY(freq)
{
	return (
		canvas.height -
		40 -
		(
			Math.log2(freq / MIN_FREQ)
			/
			Math.log2(MAX_FREQ / MIN_FREQ)
		) *
		(
			canvas.height - 180
		)
	);
}

// Time Utils ==================================================

// Compute the time in seconds elapsed since the given startTime
// < startTime: (float :: ms) Epoch timestamp marking the start of the operation
// > returns: (float :: secs) Time in seconds taken so far
function elapsedTime(startTime)
{
	const msPerSecond = 1000;
	return (performance.now() - startTime) / msPerSecond;
}

function formatTime(s)
{
	const secsPerMinute = 60;
	return (
		String(Math.floor(s / secsPerMinute)).padStart(2, "0")
		+ ":" +
		String(Math.floor(s % secsPerMinute)).padStart(2, "0")
	);
}


// Audio Processing Logic =====================================

// Convert a given frequency in Hz into a "midi" pitch value
// < freq: (int :: Hz) Frequency from the spectrogram to try to quantize into
//                     a midi pitch
// > returns: A "MidiPitchInfo" object containing the following
//   * midi: (int :: 0 <= i <= 127) The pitch identified
//   * pitch: (int :: 0 <= i < 12) The semitone number within an octave (c == 0)
//   * octave: (int: i >= 0) The c0 -> c10 octave
function tunedMidi(freq)
{
	// Convert into a Midi note number
	const midi = 
		((semitonesPerOctave * Math.log2(freq / aTuningHz)) + 
		  midiRefPitch + 
		  tuningOffset);
	
	// Decompose into components
	const octave = Math.floor(midi / semitonesPerOctave);
	const pitch  = Math.round(midi) % semitonesPerOctave;
	
	// Assemble into an object
	return { midi: midi, pitch: pitch, octave: octave };
}

// Convert an octave number into a LilyPond Octave string
// < octave: (int) Octave index
// > returns: (str) A Lilypond style octave string, using `'` or `,`
function octaveToLilypondString(octave)
{
	if (octave >= MIDDLE_C_OCTAVE) {
		// "Middle C" == c4 == "c'" == "octave = 4"
		// i.e. These are all the "treble clef" ones...
		return "'".repeat(octave - MIDDLE_C_OCTAVE + 1);
	}
	else if (octave == 3) {
		// The one below Middle C
		return "";
	}
	else if (octave == 2) {
		// Lowest we actually go in the UI...
		return ",";
	}
	else if (octave == 1) {
		// "c1" - We shouldn't really reach this
		return ",,";
	}
	else {
		// "c0" - We shouldn't get any lower
		return ",,,";
	}
}

// Given a midi pitch-semitone (0-12) and an octave value, return a 
// "pitch name label" for the UI
// < pitchIndex: (int :: 0 <= i < 12) Semitone index, starting from "C"
// < octave: (int) Octave index
// < (octaveIsOptional): (bool) If true, the octave is wrapped in parentheses
// > returns: (str) Pitch name string to use in the UI
function getPitchNameLabel(pitchIndex, octave, octaveIsOptional=false)
{
	let styleName = 
		(pitchNameStyle === LILYPOND_HYBRID_NOTATION) ? LILYPOND_NOTATION 
		                                              : pitchNameStyle;
	
	let pitchName = 
		pitchNamesTable[sharpFlatBiasMode][styleName][pitchIndex];
	
	let octaveString = `${octave}`;
	if (pitchNameStyle === LILYPOND_NOTATION) {
		octaveString = octaveToLilypondString(octave);
	}
	else if (pitchNameStyle == LILYPOND_HYBRID_NOTATION) {
		octaveString = octaveToLilypondString(octave) + `(${octave})`;
	}
	
	// Convert to a pitch name label for the UI
	if (octaveIsOptional) {
		return `${pitchName}(${octaveString})`;
	}
	else {
		return `${pitchName}${octaveString}`;
	}
}

// Given a MidiPitchInfo object, get a UI name for the pitch that represents
// < m: (MidiPitchInfo) The midi pitch info object to decompose from
// > returns: (str) String representing the pitch name + octave
function midiToLabel(m)
{
	return getPitchNameLabel(m.pitch, m.octave, true);
}

// Get the color to render the given frequency as
// < freq: (Num :: Hz) The frequency of the pitch in Hz
function colorForFreq(freq)
{
	const midiPitchInfo = tunedMidi(freq);
	
	let pitchName = midiToLabel(midiPitchInfo);
	let octave = midiPitchInfo.octave;
	
	switch (midiPitchInfo.pitch) {
		case 0: // C
			return [255,210,160];     // #FFD2A0 (peach)
		
		case 1: // C#  (NOTE: Almost never "Db"...)
			return [255,218,160];     // #FFDAA0 (lighter peach)
		
		case 2: // D
			if (octave === MIDDLE_C_OCTAVE + 1) {
				// NOTE: This needed to be made "5" as using "4" to match "d4"
				//       wasn't working...
				return [46,71,182];       // #2E47B6  (navy blue - lighter version)
			}
			if (octave <= MIDDLE_C_OCTAVE) {
				// Things below d4 should be even darker...
				return [30,92,194];       // #1E5CC2  (navy blue)
			}
			// For higher registers...
			return [55,123,225];          // #377BE1  (medium-dark blue)
		
		case 3: // D# / Eb
			if (pitchName.startsWith("e")) {
				// Eb
				if (octave <= 5) {
					// Darker Brown
					return [120,80,50];     // #785032 (darker brown)
				}
				else {
					// Darker Lavendar
					return [199,143,248];  // #C78FF8 (darker lavender)
				}
			}
			else {
				// D#
				return [56,143,233];       // #388FE9  (blue)
			}
		
		case 4: // E
			if (freq >= aTuningHz) {
				// Lavender for "Higher" E's
				if (octave >= 7) {
					// Lighter for higher
					return [231,205,254];   // #E7CDFE (lavender)
				}
				return [220,180,255];   // #DCB4FF (lavender)
			}
			
			// Brown for "Lower" E's
			return [182,116,66];        // #B67442 (warmer brown)
		
		case 5: // F
			if (octave == 7) {
				// Desaturated yellow - As this is the "harmonic band" that is really glowy
				return [237,222,148];      // #EDDE94 (desaturated yellow)
			}
			return [245,217,84];      // #F5D954 (yellow)
		
		case 6: // F# / Gb
			if (pitchName.startsWith("g") || (octave === 4)) {
				// "G"
				// NOTE: The octave == 3 thing is a hack for violin-layering,
				//       where tagging if "f#" for "open G" should just resolve to "G"
				//       (XXX: Do this earlier in the pipeline instead?)
				return [162,231,71];   // #A2E747 (darker parakeet green)
			}
			else {
				// "F"
				if (octave <= 3) {
					return [200,194,92];  // #C8C25C (lighter but darker yellow)
				}
				return [242,234,106];  // #F2EA6A (lighter yellow)
			}
		
		case 7: // G
			if (octave < 5) {
				// "G-String" on Violin Ends Up At "g3 / g4"
				return [0,80,30];    // #00501E (dark green)
			}
			if (octave === 5) {
				// "G" below tuning A
				return [70,190,50];  // #46BE32 (lawn green)
			}
			if (octave === 7 || octave === 8) {
				// De-emphasize "Harmonics Band" G, as it's too overwhelming...
				return [191,219,154]; // #BFDB9A (lighter lime green)
			}
			return [180,255,80];     // #B4FF50 (parakeet green)
		
		case 8: // G# / Ab
			if (pitchName.startsWith("g") && (aTuningHz != 432)) {
				// "G"
				if (octave <= 5) {
					// "G" below tuning A
					return [59,225,31];  // #3BE11F ("brighter forest green")
				}
				else {
					// All others
					return [197,251,126];     // #C5FB7E (brighter parakeet green)
				}
			}
			else {
				// Ab
				// NOTE: The A=432 check to force this case to happen is a hack
				//       to cope with some "off tuning" in this case ending up
				//       in the G# band instead...
				
				return [222,39,39];      // #DE2727 (darker red)
			}
		
		case 9: // A
			if (octave < 4) {
				// A below tuning A
				return [197,28,28];      // #C51C1C (dark red)
			}
			if (octave === 4) {
				// Tuning A
				return [244,21,21];      // #F41515 (tomato red)
			}
			return [255,70,70];          // #FF4646 (light red)
		
		case 10: // A# / Bb
			if (pitchName.startsWith("b")) {
				// "Bb"
				return [92,166,192];    // #5CA6C0 (teal-blue)
			}
			else {
				// "A#"
				return [251,115,115];     // #FB7373 (lighter red)
			}
		
		case 11: // B
			if (octave < 6) {
				// Lower B's should look more like D cases...
				return [68,159,237];     // #449FED  (medium blue)
			}
			return [120,220,255];    // #78DCFF (sky blue)
		
		default: // Undefined / Unknown - Light Grey
			return [180,180,180];
	}
}

// Find which detected "midiEvent" note is active for the current time
function dominantPitchAtTime(t)
{
	for (const e of midiEvents) {
		if (t >= e.start &&
			t <= e.end)
		{
			return e;
		}
	}
	
	return null;
}

// ---------------------------

// Compute FFT  (naive implementation)
function fft(sig)
{
	const N = sig.length;
	const out = new Float32Array(N / 2);
	
	for (let k = 0; k < N/2; k++) {
		let re = 0;
		let im = 0;
		
		for (let n = 0; n < N; n++) {
			const p = TWO_PI * k * n/N;
			
			re += sig[n] * Math.cos(p);
			im -= sig[n] * Math.sin(p);
		}
		
		out[k] = Math.sqrt(re*re + im*im);
	}
	
	return out;
}

// Called from processAudio to identify the dominant pitch(s)
// for the current spectrogram slice ("spec")
//
// < i: (int) The slice index being processed
// < spec: ([Num]) Current vertical slice of the spectrogram for the sample / bin
//                 being processed
//
// ! This method adds a new "midiEvent" to the "midiEvents" global list
//   if it finds anything worth adding.
function identifyMidiEventForSlice(i, spec)
{
	// Find the strongest frequency
	let strongestMagnitude = 0;
	let strongestBin = 0;
	
	for (let b = 1; b < spec.length; b++) {
		if (spec[b] > strongestMagnitude) {
			strongestMagnitude = spec[b];
			strongestBin = b;
		}
	}
	
	// Only consider this entry if it exceeds the minimum threshold
	// of significance  (see "reference_data" datafiles for examples
	// of the range of values, and why this has been set like this)
	if (strongestMagnitude > minimumPitchStrength) {
		const freq = strongestBin * fftToFreqFactor;
		const note = midiToLabel(tunedMidi(freq));
		
		const prev = midiEvents[midiEvents.length - 1];
		const t = i * hop / audioCtx.sampleRate;
		
		// Sanity Check: Skip this note if it falls out of range we're interested in.
		if (freq < MIN_FREQ || freq > MAX_FREQ) {
			console.log(`Skipping strongest frequency ${freq} at ${i} (mag = ${strongestMagnitude}, as out of range`);
			return;
		}
		
		// TODO: The pitch-change-needed thing may be blocking repeated notes
		//       showing up as new midi events...
		if (!prev ||
			(t - prev.start) > 1.1 ||
			prev.label !== note) 
		{
			midiEvents.push({
				start: t,
				end: t + 0.8,
				
				freq,
				
				label: note,
				intensity: strongestMagnitude
			});
		}
	}
}

// ---------------------------

// Recalculate the contents of the cached spectogram when some settings change
// (e.g. color assignments / brightness values)
//
// TODO: Maybe this should be async to not lock the main thread?
function recalcSpectrogram()
{
	// Skip if there isn't any cached data yet
	if (cachedSpectrogram.length == 0) {
		return;
	}
	
	// Clear the cached spectrogram image, that we're rebuilding
	spectogramCanvasCtx.clearRect(
		0,
		0,
		spectogramCanvas.width,
		spectogramCanvas.height
	);
	
	// Go through all the cached spectrogram data slices,
	// redrawing these to the cache canvas.
	for (let i = 0; i < cachedSpectrogram.length; i++) {
		redrawSpectrogramColumn(
			i,
			cachedSpectrogram[i]
		);
	}
}

// Fully recalculate spectrogram colours + midi events
// TODO: Introduce an optimised method that only changes the tagged ones
function recalcSpectrogramAndAllNoteIds()
{
	// Skip if there isn't any cached data yet
	if (cachedSpectrogram.length == 0) {
		return;
	}
	
	// Reset all the relevant bits being recalculated
	spectogramCanvasCtx.clearRect(
		0,
		0,
		spectogramCanvas.width,
		spectogramCanvas.height
	);
	
	midiEvents.length = 0;
	
	console.log("Recalculating spectrogram and all note id's...");
	
	// Reprocess each of the cached spectogram slices...
	// TODO: Update status text again with our progress
	for (let i = 0; i < cachedSpectrogram.length; i++) {
		// Redraw colours (which may haved changed due to the tuning)
		redrawSpectrogramColumn(
			i,
			cachedSpectrogram[i]
		);
		
		// Recalculate the most likely pitches
		identifyMidiEventForSlice(i, cachedSpectrogram[i]);
		
		// TODO: Update progress text
	}
}

// Only recalculate note id's  (see recalcSpectrogramAndAllNoteIds())
function recalcNoteIdsOnly()
{
	// Skip if there isn't any cached data yet
	if (cachedSpectrogram.length == 0) {
		return;
	}
	
	console.log("Recalculating all note id's...")
	midiEvents.length = 0;
	
	// Reprocess each of the cached spectrogram slices...
	// TODO: Update status text again with our progress
	for (let i = 0; i < cachedSpectrogram.length; i++) {
		// Recalculate the most likely pitches
		identifyMidiEventForSlice(i, cachedSpectrogram[i]);
	}
}

// ---------------------------

// Entry-point to process the audio file
async function processAudio(buffer)
{
	enableWaitCursor();
	analysisInProgress = true;
	
	audioBuffer = buffer;
	audioDuration = buffer.duration;
	
	midiEvents.length = 0;
	
	spectogramCanvasCtx.clearRect(
		0,
		0,
		spectogramCanvas.width,
		spectogramCanvas.height
	);
	
	cachedSpectrogram = [];
	
	const data = buffer.getChannelData(0);
	const total = Math.floor((data.length - fftSize) / hop);
	
	fixedColumnWidth = spectogramWidth / total;
	fftToFreqFactor = audioCtx.sampleRate / fftSize;
	
	const processingStart = performance.now();
	
	for (let i = 0; i < total; i++) {
		// Perform CQT transform
		const seg =
			data.slice(
				i * hop,
				i * hop + fftSize
			);
		
		const segCountScaleFactor = TWO_PI / (seg.length - 1);
		for (let j = 0; j < seg.length; j++) {
			seg[j] *= 0.5 * ( 1 - Math.cos(j * segCountScaleFactor) );
		}
		
		const spec = fft(seg);
		cachedSpectrogram.push(spec);
		
		// Convert FFT results to the colourful plotted results
		redrawSpectrogramColumn(i, spec);
		
		// Try to identify the likely "dominant pitch" at this point
		identifyMidiEventForSlice(i, spec);
		
		// Update progress
		const elapsed = elapsedTime(processingStart);
		const progress = (i + 1) / total;
		const estimate = elapsed / progress;
		const remaining = estimate - elapsed;
		
		let statusText =
				`Processing ${
					i+1
				}/${
					total
				} • elapsed ${
					elapsed.toFixed(1)
				}s • remaining ≈ ${
					remaining.toFixed(1)
				}s`;
		updateStatusText(statusText);
		
		// FIXME: This breaks if the tab loses focus
		await new Promise(
			r => setTimeout(r, 0)
		);
	}
	
	const totalTimeElapsed = elapsedTime(processingStart);
	updateStatusText(
		`Ready.   Processing took ${totalTimeElapsed.toFixed(1)}s`);
	
	analysisInProgress = false;
	clearWaitCursor();
}

// Rendering ========================================================

function redrawSpectrogramColumn(i, spec)
{
	for (let b = 1; b < spec.length; b++) {
		const freq = b * fftToFreqFactor;
		
		if (freq < MIN_FREQ || freq > MAX_FREQ) {
			continue;
		}
		
		const y = freqToY(freq);
		const mag = spec[b];
		
		const intensity =
			Math.min(
				1,
				(
					Math.log10(1 + mag)
					/ 2.2
				) * brightnessBoost
			);
		
		if (intensity < 0.02) {
			continue;
		}
		
		const c = colorForFreq(freq);
		const glow = 1.5 + intensity * 4.5;
		
		const grad =
			spectogramCanvasCtx.createLinearGradient(
				0,
				y - glow,
				0,
				y + glow
			);
		
		grad.addColorStop(
			0,
			colorWithAlpha(c, 0)
		);
		
		grad.addColorStop(
			0.5,
			colorWithAlpha(c, intensity)
		);
		
		grad.addColorStop(
			1,
			colorWithAlpha(c, 0)
		);
		
		spectogramCanvasCtx.fillStyle = grad;
		
		spectogramCanvasCtx.fillRect(
			i * fixedColumnWidth,
			y - glow,
			fixedColumnWidth + 1,
			glow * 2
		);
	}
}

function drawTimeline()
{
	if (!audioDuration) {
		return;
	}
	
	const y = canvas.height - TIMELINE_GUTTER;
	const px = spectogramWidth / audioDuration;
	
	for (let s = 0; s <= audioDuration; s++) {
		const x = LEFT_GUTTER + s * px;
		const major = (s % 10 === 0);
		
		ctx.strokeStyle = "white";
		
		ctx.beginPath();
		ctx.moveTo(x,y);
		ctx.lineTo(
			x,
			y - (major ? 24 : 12)
		);
		ctx.stroke();
		
		if (major) {
			ctx.fillStyle = "white";
			
			ctx.font = "11px monospace";
			
			ctx.fillText(
				formatTime(s),
				x + 3,
				y - 30
			);
		}
	}
}

function drawCMarkers()
{
	for (let octave = 0; octave < 9; octave++) {
		const midi = (octave + 1) * semitonesPerOctave;
		const freq =
			aTuningHz *
			Math.pow(
				2,
				(midi - midiRefPitch) / semitonesPerOctave
			);
		
		if (freq < MIN_FREQ || freq > MAX_FREQ) {
			continue;
		}
		
		const MARKER_COLOR = [255, 255, 255];
		const y = freqToY(freq);
		
		ctx.strokeStyle = colorWithAlpha(MARKER_COLOR, 0.25);
		
		ctx.beginPath();
		ctx.moveTo(0, y);
		ctx.lineTo(16, y);
		ctx.stroke();
		
		if (octave === MIDDLE_C_OCTAVE) {
			// C4
			ctx.font = "bold 12px monospace";
			
			const label = getPitchNameLabel(C_PITCH_INDEX, MIDDLE_C_OCTAVE);
			const tw = ctx.measureText(label).width;
			
			ctx.fillStyle = colorWithAlpha(MARKER_COLOR, 0.10);
			
			ctx.beginPath();
			ctx.roundRect(
				18,
				y - 8,
				tw + 10,
				14,
				5
			);
			ctx.fill();
			
			ctx.strokeStyle = colorWithAlpha(MARKER_COLOR, 0.55);
			ctx.stroke();
			
			ctx.fillStyle = "white";
			ctx.fillText(label, 23, y+2)
		}
		else {
			// All other C's
			const label = getPitchNameLabel(C_PITCH_INDEX, octave);
			
			ctx.fillStyle = colorWithAlpha(MARKER_COLOR, 0.75);
			ctx.font = "11px monospace";
			ctx.fillText(label, 24, y+3)
		}
	}
}

function drawBubbles()
{
	let activeFound = false;
	for (const e of midiEvents) {
		const x = timeToX(e.start);
		const dist = Math.abs(x - scrubberPosition);
		
		const active = (dist < 36) && !activeFound;
		if (active) {
			activeFound = true;
		}
		
		// TODO: Those nearby should also get raised up (+ faded an intermediate color), so they look like they are "jumping" to meet the dot
		
		// NOTE: The bubbles should end up inside the timeline strip,
		//       otherwise, some of them end up mingling with bass-heavy
		//       bits in more professionally produced music...
		const bubbleY = canvas.height * 0.98;
		
		if (active) {
			// Orange / "Active" Bubble
			const label = e.label;
			
			ctx.font = "bold 12px monospace";
			const tw = ctx.measureText(label).width;
			
			const w =
				Math.min(
					120,
					tw + 34
				);
			
			let bx =
				Math.max(
					4,
					Math.min(
						spectogramWidth - w - 4,
						x - w * 0.5
					)
				);
			
			// Orange Fill for label background
			ctx.fillStyle = colorWithAlpha(SCRUBBER_COLOR, 0.92);
			
			ctx.beginPath();
			ctx.roundRect(
				bx,
				bubbleY - 25, //bubbleY - 12,
				w,
				22,
				10
			);
			ctx.fill();
			
			// Label Text
			ctx.fillStyle = "white";
			ctx.fillText(
				label,
				bx + 16,
				bubbleY - 10 //bubbleY + 3
			);
		}
		else {
			// Blue bubble
			ctx.fillStyle = colorWithAlpha(BUBBLE_COLOR, 0.58);
			
			ctx.beginPath();
			ctx.roundRect(
				x - 6,
				bubbleY - 4,
				12,
				8,
				4
			);
			ctx.fill();
		}
	}
}

function render()
{
	requestAnimationFrame(render);
	
	// Use fillRect so that the exported video will have the same background as the viewport one does.
	ctx.fillStyle = '#454545';
	ctx.fillRect(
		0,
		0,
		canvas.width,
		canvas.height
	);
	
	// Draw the cached spectogram from the "spectogramCanvas"...
	if (recording) {
		// When recording, we want a "slow reveal" effect...
		
		// 1) Draw "darkened" backdrop of the complete  (i.e. by rendering it with less alpha + darkened)
		if (showGhostBackdropWhenRendering) {
			ctx.save();
			
			// Set drawing mode flags to be less visible
			ctx.globalAlpha = 0.1;
			
			// Draw this now
			ctx.drawImage(
				spectogramCanvas,
				LEFT_GUTTER,
				0
			);
			
			ctx.restore();
		}
		
		// 2) Draw the region being revealed
		ctx.save();
		{
			// 2.1) Define the visible region (i.e. between margin + scrubber)
			ctx.beginPath();
			ctx.rect(
				LEFT_GUTTER,
				0,
				scrubberPosition - LEFT_GUTTER,
				canvas.height
			);
			ctx.clip();
			
			// 2.2) Then doing this drawing will only show the clipped parts
			ctx.drawImage(
				spectogramCanvas,
				LEFT_GUTTER,
				0
			);
		}
		ctx.restore();
	}
	else {
		// Normal Interactive Drawing - Draw the whole thing
		ctx.drawImage(
			spectogramCanvas,
			LEFT_GUTTER,
			0
		);
	}
	
	drawTimeline();
	drawCMarkers();
	drawBubbles();
	
	if (playbackRunning) {
		const current =
			playbackOffset +
			(audioCtx.currentTime - playbackStartTime);
		
		scrubberPosition = timeToX(current);
	}
	
	if (scrubberPosition > 0) {
		// Scrubber Line
		ctx.save();
		
		ctx.strokeStyle = colorWithAlpha(SCRUBBER_COLOR, 0.85);
		ctx.lineWidth = 2;
		
		if (recording) {
			// Show glow if recording
			ctx.shadowBlur = 15;
			ctx.shadowColor = colorWithAlpha(SCRUBBER_COLOR, 0.95);
		}
		
		ctx.beginPath();
		ctx.moveTo(scrubberPosition, 0);
		ctx.lineTo(scrubberPosition, canvas.height);
		ctx.stroke();
		
		ctx.restore();
		
		// Top Tag/Bubble - Time + Pitch
		const t = xToTime(scrubberPosition);
		const pitch = dominantPitchAtTime(t);
		
		const bubbleY =
			document.getElementById("topbar").offsetHeight + 8;
		
		const pitchNameForLabel = (pitch) ? pitch.label : "--";
		const label =`${formatTime(t)} ${pitchNameForLabel}`;
		
		ctx.font = "12px monospace";
		
		const tw = ctx.measureText(label).width;
		const bx =
			Math.min(
				spectogramWidth - tw - 58,
				scrubberPosition + 10
			);
		
		ctx.fillStyle = colorWithAlpha(SCRUBBER_COLOR, 0.95);
		
		ctx.beginPath();
		ctx.roundRect(
			bx,
			bubbleY,
			tw + 44,
			24,
			8
		);
		ctx.fill();
		
		if (pitch) {
			const c = colorForFreq(pitch.freq);
			ctx.fillStyle = colorFromTuple(c);
			
			ctx.beginPath();
			ctx.roundRect(
				bx+8,
				bubbleY+5,
				14,
				14,
				4
			);
			ctx.fill();
		}
		
		ctx.fillStyle = "white";
		ctx.fillText(
			label,
			bx+30,
			bubbleY+16
		);
	}
}

// Audio Playback Functions =========================

// Stop current audio playback
function stopPlayback()
{
	if (playbackSource != null) {
		// NOTE: Need to stop and disconnect any running audio-streams,
		//       otherwise they can build up and keep overlapping.
		try {
			playbackSource.stop();
		}
		catch(e) {
		}
		
		if (recordDest != null) {
			recordDest.disconnect();
			recordDest = null;
		}
		
		playbackSource.disconnect();
		playbackSource = null;
	}
	
	// Stop the animation loop when we aren't updating
	//
	// Do this to try stopping laptops chewing away 30% CPU
	// constantly running this.
	cancelAnimationFrame(render);
	
	// Clear scrubber position so it doesn't hang around
	scrubberPosition = INVALID_HIDDEN_SCRUBBER_IDX;
	
	// Reset UI state
	playbackRunning = false;
	setPlayButtonState();
}

// Playback
function playAt(offset)
{
	// Need to stop anything already playing, otherwise we could have 
	// overlapping audio (with the older one then unstoppable).
	stopPlayback();
	
	// Resume the audioCtx if it has been stopped for some reason
	if (audioCtx.state !== "running") {
		audioCtx.resume();
	}
	
	// Create a new playbackSource object, since the old one got destroyed
	playbackSource = audioCtx.createBufferSource();
	playbackSource.buffer = audioBuffer;
	
	playbackSource.connect(audioCtx.destination);
	
	if (recording) {
		playbackSource.connect(recordDest);
	}
	
	// Reset relative offsets, as audioCtx.currentTime is a readonly
	// monotonically increasing internal timers, and we use the time
	// offset from that to determine where we are in the audio.
	playbackOffset = offset;
	playbackStartTime = audioCtx.currentTime;
	
	// Start running playback
	playbackSource.start(0, offset);
	playbackRunning = true;
	
	// Trigger rendering again
	render();
	
	// Update UI to indicate running state...
	setPauseButtonState();
	
	playbackSource.onended = () => {
		if (recording) {
			// Don't terminate immediately, to try to ensure the
			// stream end-length gets encoded properly
			setTimeout(() => {
				if (recorder && recording) {
					recorder.stop();
				}
			}, 250);
		}
		else {
			// Just stop
			stopPlayback();
		}
		
		// Hide the scrubber
		scrubberPosition = INVALID_HIDDEN_SCRUBBER_IDX;
	};
}

// Scrubbing - Play audio when timeline scrubbed to this timestamp (in secs)
// < time: (float :: secs) Seconds since start of the clip to preview the sound at
function previewAt(time)
{
	// XXX: Is this needed / valid?
	if (!audioBuffer) {
		return;
	}
	
	if (Math.abs(time -lastScrubPreviewTime) < 0.03) {
		return;
	}
	
	lastScrubPreviewTime = time;
	if (scrubPreviewSource) {
		try {
			scrubPreviewSource.stop();
		}
		catch(e) {
		}
	}
	
	scrubPreviewSource = audioCtx.createBufferSource();
	scrubPreviewSource.buffer = audioBuffer;
	
	const gain = audioCtx.createGain();
	gain.gain.value = 0.28;
	
	scrubPreviewSource.connect(gain);
	gain.connect(audioCtx.destination);
	
	scrubPreviewSource.start(
		0,
		Math.max(0, time),
		0.09
	);
}

// Scrubbing - Interaction handler. Place scrubber + preview the sound
// < x: (int) X-coordinate to move the scrubber to
function scrubAt(x)
{
	// Set new position of the scrubber
	// NOTE: Need to clamp to not go into the gutter
	scrubberPosition = Math.max(LEFT_GUTTER, x);
	
	// Trigger preview of soundbyte under scrubber
	const t = xToTime(scrubberPosition);
	previewAt(t);
	
	// Resume playing from this point, if playback was engaged
	if (playbackRunning) {
		playAt(t);
	}
}

// Entrypoint for starting the audio analysis process
async function analyseAudio()
{
	const f = document.getElementById("file").files[0];
	if (!f) {
		return;
	}
	
	// Save filename into variable used for making export file
	inputFileName = f.name;
	
	// Clear + park the scrubber (as it will now be invalidated)
	scrubberPosition = INVALID_HIDDEN_SCRUBBER_IDX;
	
	// Read the audio-file buffer
	const arr = await f.arrayBuffer();
	const buf = await audioCtx.decodeAudioData(arr);
	
	// Trigger processing of it...
	await processAudio(buf);
}

// Video Recording  (Screen Capture)
async function startRecording()
{
	chunks = [];
	
	const canvasStream = canvas.captureStream(60);
	recordDest = audioCtx.createMediaStreamDestination(); // create a new one
	
	const combined = new MediaStream([
		...canvasStream.getVideoTracks(),
		...recordDest.stream.getAudioTracks()
	]);
	
	const EXPORT_FORMAT_MP4  = {
		mime: "video/mp4",
		extn: "mp4"
	};
	const EXPORT_FORMAT_WEBM = {
		mime: "video/webm",
		extn: "webm"
	};
	
	const exportFormat =
		MediaRecorder.isTypeSupported(EXPORT_FORMAT_MP4.mime)
		? EXPORT_FORMAT_MP4
		: EXPORT_FORMAT_WEBM;
	
	recorder = new MediaRecorder(combined, { mimeType: exportFormat.mime });
	recorder.ondataavailable = e => {
		if (e.data.size > 0) {
			chunks.push(e.data);
		}
	};
	
	recorder.onstop = () => {
		// IMPORTANT: flush audio stream cleanly
		recordDest.stream.getTracks().forEach(t => t.stop());
		
		const blob = new Blob(chunks, { type: exportFormat.mime });
		const url = URL.createObjectURL(blob);
		
		const a = document.createElement("a");
		a.href = url;
		
		const filename =
			`${inputFileName}_spectrogram_v${recordVersion}.${exportFormat.extn}`;
		
		recordVersion++;
		
		a.download = filename;
		a.click();
		
		URL.revokeObjectURL(url);
		
		recordDest = null;
		
		recording = false;
		setStartRecordingButtonState();
		
		// For good measure, otherwise the "play/pause button stays on "pause"
		stopPlayback();
	};
	
	recorder.start();
	if (recorder.state !== "recording") {
		alert("Media Recorder not recording!");
		return;
	}
	
	recording = true;
	setStopRecordingButtonState();
	
	// always start from beginning
	playAt(0);
}

// Export detected note timing info
function exportDetectedNotes()
{
	if (!midiEvents.length) {
		return;
	}
	
	let txt = "time_seconds,note,freq_hz,intensity\n";
	for (const e of midiEvents) {
		// TODO: Include other notes considered by not included
		let lineValues = [
			e.start.toFixed(3),
			e.label,
			e.freq.toFixed(2),
			e.intensity
		]
		
		txt += lineValues.join(",\t") + "\n"
	}
	
	const blob =
		new Blob(
			[txt],
			{
				type: "text/csv"
			}
		);
	
	const url = URL.createObjectURL(blob);
	const a = document.createElement("a");
	a.href = url;
	
	const filename = `${inputFileName}_detected_notes_v${recordVersion}.csv`;
	a.download = filename;
	a.click();
	
	URL.revokeObjectURL(url);
}

// Window Resize Handling ==============================

// Handle window resizing
// TODO: Canvas gets blanked for the portions not using this scale. 
//       Need to trigger recalculation
function resize()
{
	// Update the canvas bounds
	canvas.width = innerWidth;
	canvas.height = innerHeight;
	
	// Update viewable area
	spectogramWidth = canvas.width - LEFT_GUTTER;
	
	// Compute the cached spectrogram canvas size
	spectogramCanvas.width = spectogramWidth;
	spectogramCanvas.height = innerHeight;
	
	// Trigger repaint / recalcs?
	// TODO: Shouldn't do this while still analysing
	if (!analysisInProgress) {
		recalcSpectrogram();
	}
}

addEventListener("resize", resize);
resize();

// Update the "A tuning frequency" when the dropdown changes
document.getElementById("aTuning").onchange = () => {
	// Flush the value from the dropdown to the value used internally
	const newATuningHz = parseInt(aTuning.value);
	if (newATuningHz != aTuningHz) {
		console.log(`Updating aTuningHz to ${aTuningHz}`);
		aTuningHz = newATuningHz;
	}
	
	// Only trigger recalc if there is data to already cached data to recompute
	if (cachedSpectrogram.length > 0) {
		enableWaitCursor();
		
		console.log(`Retuning with new A=${aTuningHz} Hz (and tuningOffset = ${tuningOffset})`);
		recalcSpectrogramAndAllNoteIds();
		
		clearWaitCursor();
	}
};

// Reset A tuning frequency to the hardcoded default
function resetATuningHz()
{
	// The standard tuning frequency
	aTuningHz = aTuning.value = 440;
}

// Update the brightnessBoost value, with the given float value.
// ! This causes a recomputation of the spectogram, which can be slow...
function setBrightnessBoost(value)
{
	enableWaitCursor();
	
	brightnessSlider.value = brightnessBoost = value;
	recalcSpectrogram();
	
	clearWaitCursor();
}

// Reset brightness boost to default values
function resetBrightnessBoost()
{
	// NOTE: 1 here is the initial value of the slider (as per the HTML)
	setBrightnessBoost(1);
}

document.getElementById("brightnessSlider").addEventListener(
	"input",
	e => {
		debounce(STD_DEBOUNCE_DELAY_MS, () => {
			// * Need to use debounce here as this update op is slow,
			//   but the slider updates a bazillion times when dragged
			// * This does end up setting the parsed value back 
			//   onto the variable in question
			let newBrightness = parseFloat(e.target.value);
			console.log(`new brightness = ${newBrightness}`); 
			
			setBrightnessBoost(newBrightness);
		})();
	}
);

document.getElementById("resetBrightnessBtn").onclick = resetBrightnessBoost;

// ----------------------------------

// Update the "tuningOffset" value, with the given float value.
// ! This causes all the detected pitch values to need to be re-generated
//   (and also the spectrogram colouring)
function setTuningOffsetValues(value)
{
	tuningSlider.value = tuningOffset = value;
	
	document.getElementById("tuningLabel").textContent =
		tuningOffset.toFixed(2) + " st";
}

// Actually perform all the expensive recomputations associated with a recent
// tuning update change.
function applyTuningOffsetUpdate()
{
	enableWaitCursor();
	
	console.log(`Retuning with A=${aTuningHz} Hz and tuningOffset = ${tuningOffset}`);
	recalcSpectrogramAndAllNoteIds();
	
	clearWaitCursor();
}

// Reset Tuning Offset value
function resetTuningOffset()
{
	// NOTE: Resetting is a two-step operation, given the need to decouple
	//       fast-ui-feedback from recomputed spectrogram data (slow)
	setTuningOffsetValues(0);
	applyTuningOffsetUpdate();
}

document.getElementById("tuningSlider").addEventListener(
	"input",
	e => {
		// Only flush the tuning slider updates to all the properties that
		// depend on it (e.g. UI label) so that user has feedback on what
		// they are setting, and can fine-tune before it triggers an update.
		//
		// NOTE: This step will end up flushing the just-parsed value back to
		//       the slider it just go read from. But this simplifies the update
		//       handling for all other cases.
		setTuningOffsetValues(parseFloat(e.target.value));
		
		debounce(STD_DEBOUNCE_DELAY_MS, () => {
			// Now, only actually perform the heavy recalc from this
			// (or another subsequent update) if debounce() allows it to 
			// happen in a throttled manner.
			applyTuningOffsetUpdate();
		})();
	}
);

document.getElementById("resetTuningOffsetBtn").onclick = resetTuningOffset;

// Mouse Event Handlers =====================================

canvas.addEventListener(
	"mousedown",
	e => {
		scrubbing = true;
		scrubAt(e.clientX);
	}
);

canvas.addEventListener(
	"mousemove",
	e => {
		// Only handle when not recording
		if (recording) {
			return;
		}
		
		// Don't update scrubber position if not already scrubbing
		// (i.e. don't do anything unless mouse-button is held down)
		if (scrubbing) {
			scrubAt(e.clientX);
		}
	}
);

addEventListener(
	"mouseup",
	() => {
		scrubbing = false;
	}
);


// Playback Button Event Handlers ===========================

document.getElementById("playPauseBtn").onclick = () => {
	if (playbackRunning) {
		stopPlayback();
	}
	else {
		playAt(xToTime(Math.max(LEFT_GUTTER, scrubberPosition)));
	}
};

document.getElementById("stopBtn").onclick = () => {
	stopPlayback();
	
	// Send the "suspend" signal, so that Firefox on Linux will
	// stop showing the "playing audio" symbol + consuming CPU
	// and battery life like crazy
	audioCtx.suspend();
	
	// Hide the scrubber
	scrubberPosition = INVALID_HIDDEN_SCRUBBER_IDX;
};

document.getElementById("restartBtn").onclick = () => {
	// Reset scrubber to the start of the timeline
	scrubberPosition = LEFT_GUTTER;
	
	// Restart playback from the beginning too
	playAt(0);
};

document.getElementById("recordBtn").onclick = () => {
	if (recording) {
		recorder.stop();
	}
	else {
		startRecording();
	}
};

document.getElementById("analyzeBtn").onclick = analyseAudio;

document.getElementById("exportBtn").onclick = exportDetectedNotes;

function syncResetState()
{
	resetPitchNameStyle();
	resetSharpFlatBiasMode();
	resetATuningHz();
	resetTuningOffset();
	resetBrightnessBoost();
}

// Main Entrypoint =========================================

// Ensure internal values are set to match what the widgets have set
syncResetState();

// Start rendering loop
render();
